<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IRON">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="PWA de suivi de séances de musculation">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>IRON — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#141414;--card:#1a1a1a;--card2:#202020;
  --border:#272727;--border2:#333;
  --accent:#aaff00;--accent-dim:rgba(170,255,0,.1);--accent-glow:rgba(170,255,0,.25);
  --red:#ff4455;--red-dim:rgba(255,68,85,.1);
  --orange:#ff8c00;--orange-dim:rgba(255,140,0,.1);
  --blue:#38bdf8;--blue-dim:rgba(56,189,248,.1);
  --text:#f0f0f0;--text-muted:#6b6b6b;--text-dim:#383838;
  --radius:18px;--radius-sm:11px;--radius-xs:7px;
  --nav-h:68px;--hdr-h:56px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --trans:300ms cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
button{border:none;background:none;color:inherit;font:inherit;cursor:pointer}
input{border:none;background:none;color:inherit;font:inherit;outline:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
*{-webkit-overflow-scrolling:touch;scrollbar-width:none}
::-webkit-scrollbar{display:none}
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
#hdr{height:calc(var(--hdr-h) + var(--st));padding-top:var(--st);display:flex;align-items:center;
  justify-content:space-between;padding-inline:18px;background:var(--bg);
  border-bottom:1px solid var(--border);z-index:10;flex-shrink:0}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--accent)}
.hdr-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .1s}
.hdr-btn:active{transform:scale(.91);background:var(--card2)}
#pw{flex:1;position:relative;overflow:hidden}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  padding-bottom:calc(var(--nav-h) + var(--sb) + 20px);
  transition:transform var(--trans),opacity var(--trans);will-change:transform}
.page.sR{transform:translateX(100%);opacity:0}
.page.sL{transform:translateX(-100%);opacity:0}
.page.sA{transform:none;opacity:1}
.page.xL{transform:translateX(-28%);opacity:0;pointer-events:none}
.page.xR{transform:translateX(28%);opacity:0;pointer-events:none}
#nav{height:calc(var(--nav-h) + var(--sb));padding-bottom:var(--sb);background:var(--surface);
  border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);
  z-index:10;flex-shrink:0}
.ni{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--text-dim);transition:color var(--trans);position:relative}
.ni.on{color:var(--accent)}
.ni:active{opacity:.7}
.ni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ni span{font-size:9.5px;font-weight:600;letter-spacing:.6px;text-transform:uppercase}
.ndot{position:absolute;top:8px;right:calc(50% - 15px);width:7px;height:7px;
  border-radius:50%;background:var(--orange);animation:pdot 2s infinite}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--radius-sm);
  font-weight:600;font-size:15px;padding:15px 20px;transition:all .12s;width:100%}
.btn-p{background:var(--accent);color:#000;box-shadow:0 4px 20px var(--accent-glow)}
.btn-p:active{transform:scale(.97);box-shadow:0 2px 8px var(--accent-glow)}
.btn-s{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-s:active{transform:scale(.97);background:var(--border)}
.btn-d{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,68,85,.25)}
.btn-o{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,140,0,.25)}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.pg{padding:16px}.gap{display:flex;flex-direction:column;gap:14px}
.lbl{font-size:10.5px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-muted);
  margin-bottom:8px;padding:0 2px}
.today-card{background:linear-gradient(135deg,#1c1c1c,#111);border-radius:var(--radius);
  border:1px solid var(--border);padding:22px;position:relative;overflow:hidden}
.today-card::after{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;
  border-radius:50%;background:var(--accent-dim);filter:blur(50px);pointer-events:none}
.tc-date{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.tc-num{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--accent);margin-bottom:2px}
.tc-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;line-height:1.1;margin-bottom:14px}
.tc-tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.tag{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.4px}
.tag-a{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(170,255,0,.2)}
.tag-g{background:var(--card2);color:var(--text-muted);border:1px solid var(--border)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center}
.sc-v{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;line-height:1;margin-bottom:3px}
.sc-l{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px}
.ls-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px 18px}
.ls-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ls-name{font-weight:600;font-size:14px}
.ls-date{font-size:11px;color:var(--text-muted)}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;box-shadow:0 0 6px var(--accent-glow)}
.sso{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;transition:all var(--trans)}
.sso:active{transform:scale(.98)}.sso.rec{border-color:rgba(170,255,0,.3);background:var(--accent-dim)}
.sso-n{font-weight:600;font-size:14px}.sso-m{font-size:11px;color:var(--text-muted);margin-top:2px}
.badge{font-size:9.5px;font-weight:700;padding:4px 8px;border-radius:20px;background:var(--accent);color:#000;letter-spacing:.4px}
.chevron{color:var(--text-muted);font-size:20px}
.rb{background:var(--orange-dim);border:1px solid rgba(255,140,0,.3);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:10px}
.rb-l{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:1.2px;text-transform:uppercase}
.rb-n{font-weight:700;font-size:15px}
.rest-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
  padding:32px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
#sess-ov{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform 420ms cubic-bezier(.4,0,.2,1);will-change:transform}
#sess-ov.open{transform:none}
.sh{padding:calc(var(--st) + 14px) 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sh-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sh-close{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .1s}
.sh-close:active{transform:scale(.9)}
.sh-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.sh-timer{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);
  background:var(--accent-dim);padding:4px 10px;border-radius:20px;border:1px solid rgba(170,255,0,.2)}
.sh-prog-t{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.sh-prog{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.sh-prog-f{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;box-shadow:0 0 8px var(--accent-glow)}
#rest-strip{background:linear-gradient(90deg,var(--orange-dim),rgba(255,140,0,.03));
  border-bottom:1px solid rgba(255,140,0,.2);padding:10px 18px;flex-shrink:0;
  display:none;align-items:center;justify-content:space-between}
#rest-strip.vis{display:flex}
.rst-l{font-size:11px;color:var(--orange);font-weight:600;letter-spacing:.5px}
.rst-t{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--orange)}
.rst-presets{display:flex;gap:6px}
.rst-preset{font-size:10px;font-weight:700;padding:5px 9px;border-radius:20px;
  background:rgba(255,140,0,.12);color:var(--orange);border:1px solid rgba(255,140,0,.3);transition:all .1s}
.rst-preset:active{transform:scale(.93)}
.rst-done{font-size:11px;font-weight:700;padding:7px 14px;border-radius:20px;background:var(--orange);color:#000;transition:all .1s}
.rst-done:active{transform:scale(.93)}
#sb{flex:1;overflow-y:auto;padding:14px 16px}
.ec{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden;transition:border-color var(--trans)}
.ec.done{border-color:rgba(170,255,0,.35)}
.ec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 14px;cursor:pointer;user-select:none}
.ec-hdr:active{background:var(--card2)}
.ec-info{flex:1;min-width:0}
.ec-name{font-weight:700;font-size:14px;line-height:1.2;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ec-meta{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace}
.ec-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.ec-del{width:28px;height:28px;border-radius:50%;background:var(--red-dim);border:1px solid rgba(255,68,85,.2);
  display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--red);transition:all .1s}
.ec-del:active{transform:scale(.88)}
.ec-swap{width:28px;height:28px;border-radius:50%;background:var(--card2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-muted);transition:all .1s}
.ec-swap:active{transform:scale(.88);color:var(--orange)}
.sdg{font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;
  background:var(--accent-dim);color:var(--accent);border:1px solid rgba(170,255,0,.2);font-family:'DM Mono',monospace}
.sdg.full{background:rgba(170,255,0,.18)}
.arr{color:var(--text-muted);font-size:13px;transition:transform var(--trans)}
.arr.up{transform:rotate(180deg)}
.ec-sets{border-top:1px solid var(--border);padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.sr{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--radius-sm);
  background:var(--card2);border:1px solid transparent;transition:all var(--trans)}
.sr.ok{background:rgba(170,255,0,.055);border-color:rgba(170,255,0,.18)}
.sn{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);width:22px;text-align:center;flex-shrink:0}
.wg{flex:1;display:flex;align-items:center;gap:5px}
.wb{width:28px;height:28px;border-radius:var(--radius-xs);background:var(--card);border:1px solid var(--border);
  font-size:17px;font-weight:300;color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0}
.wb:active{transform:scale(.88);background:var(--border2);color:var(--text)}
.wi-w{flex:1;display:flex;align-items:center;justify-content:center;gap:2px}
.wi{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;text-align:center;width:48px;background:transparent;padding:2px 0}
.sr.ok .wi{color:var(--accent)}
.wu{font-size:10px;color:var(--text-muted)}
.rdiv{width:1px;height:22px;background:var(--border);flex-shrink:0}
.rg{display:flex;align-items:center;gap:4px;flex-shrink:0}
.rb2{width:24px;height:24px;border-radius:var(--radius-xs);background:var(--card);border:1px solid var(--border);
  font-size:14px;font-weight:300;color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:all .1s}
.rb2:active{transform:scale(.88);background:var(--border2)}
.ri{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;min-width:26px;text-align:center;background:transparent;color:var(--text)}
.sr.ok .ri{color:var(--accent)}
.rx{font-size:10px;color:var(--text-muted)}
.ck{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:transparent;
  display:flex;align-items:center;justify-content:center;font-size:15px;color:transparent;
  transition:all .2s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.ck:active{transform:scale(.85)}
.sr.ok .ck{border-color:var(--accent);background:var(--accent);color:#000}
@keyframes chk{0%{transform:scale(1)}35%{transform:scale(1.28)}65%{transform:scale(.92)}100%{transform:scale(1)}}
.ck.pop{animation:chk .3s ease}
.add-ex-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;
  border-radius:var(--radius);border:1.5px dashed var(--border2);color:var(--text-muted);
  font-size:14px;font-weight:500;transition:all var(--trans);margin-bottom:12px}
.add-ex-btn:active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
#sf{padding:14px 16px;padding-bottom:calc(14px + var(--sb));border-top:1px solid var(--border);flex-shrink:0}
.hc{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
  padding:16px 18px;cursor:pointer;transition:all var(--trans);position:relative;overflow:hidden}
.hc:active{transform:scale(.985)}
.hc-acc{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:3px 0 0 3px}
.hc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hc-name{font-weight:700;font-size:14px}.hc-date{font-size:11px;color:var(--text-muted)}
.hc-stats{display:flex;gap:14px;flex-wrap:wrap}
.hc-st{font-size:11.5px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.hc-st b{color:var(--text);font-family:'DM Mono',monospace}
.hc-det{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;display:none;flex-direction:column;gap:4px}
.hc.exp .hc-det{display:flex}
.hd-ex{display:flex;flex-direction:column;gap:2px;padding:8px 10px;background:var(--card2);border-radius:var(--radius-xs);border:1px solid var(--border)}
.hd-exname{font-size:12px;font-weight:600;margin-bottom:4px}
.hd-sets{display:flex;flex-wrap:wrap;gap:5px}
.hd-set{font-size:10.5px;font-family:'DM Mono',monospace;padding:3px 7px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--text-muted)}
.hd-set.done{background:var(--accent-dim);border-color:rgba(170,255,0,.2);color:var(--accent)}
.ptabs{display:flex;gap:6px;padding:14px 16px 0;flex-shrink:0}
.ptab{flex:1;padding:9px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;
  letter-spacing:.6px;text-transform:uppercase;transition:all var(--trans);text-align:center;
  background:var(--card);border:1px solid var(--border);color:var(--text-muted)}
.ptab.on{background:var(--accent-dim);border-color:rgba(170,255,0,.3);color:var(--accent)}
.pcon{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:14px}
.ts-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.ts-pill{font-size:11px;font-weight:700;padding:6px 12px;border-radius:20px;flex-shrink:0;
  background:var(--card);border:1px solid var(--border);color:var(--text-muted);transition:all var(--trans)}
.ts-pill.on{background:var(--accent-dim);border-color:rgba(170,255,0,.3);color:var(--accent)}
.cc{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px}
.cc-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.cc-name{font-weight:700;font-size:14px;flex:1;margin-right:10px}
.cc-val{text-align:right}
.cc-kg{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--accent)}
.cc-delta{font-size:10px;color:var(--accent);margin-top:1px}
.cc-delta.neg{color:var(--red)}
.chart-box{height:110px;position:relative}
canvas.ch{width:100%;height:100%}
.no-data{height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:12px}
.ex-sel-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all var(--trans)}
.ex-sel-card:active{transform:scale(.98)}
.bw-input-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:18px}
.bw-row{display:flex;align-items:center;gap:10px;margin-top:12px}
.bw-inp{flex:1;font-family:'DM Mono',monospace;font-size:28px;font-weight:500;text-align:center;color:var(--text)}
.bw-unit{font-size:14px;color:var(--text-muted);font-weight:500}
.set-grp{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.set-item{background:var(--card);padding:15px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.set-item:last-child{border-bottom:none}
.set-lbl{font-weight:500;font-size:14px}.set-desc{font-size:11px;color:var(--text-muted);margin-top:2px}
.set-ctrl{display:flex;align-items:center;gap:8px}
.set-inp{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:7px 10px;font-size:13px;color:var(--text);text-align:right}
#mbg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);
  z-index:200;opacity:0;pointer-events:none;transition:opacity var(--trans)}
#mbg.open{opacity:1;pointer-events:all}
#msh{position:fixed;bottom:0;left:0;right:0;background:var(--surface);
  border-radius:22px 22px 0 0;z-index:201;padding:18px 18px calc(18px + var(--sb));
  transform:translateY(100%);transition:transform 360ms cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto}
#msh.open{transform:none}
.sh-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.sh-ttl{font-weight:700;font-size:18px;margin-bottom:16px}
.sw-inp-w{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 14px;gap:10px;margin-bottom:14px}
.sw-inp{flex:1;font-size:15px}
.sw-sugg{display:flex;flex-direction:column;gap:7px}
.sw-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;text-align:left;font-size:13px;display:flex;align-items:center;gap:10px;transition:all var(--trans)}
.sw-btn:active{background:var(--card2);border-color:var(--accent)}
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--sb) + 14px);left:16px;right:16px;
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);
  padding:13px 16px;font-size:13px;font-weight:600;z-index:400;
  transform:translateY(14px);opacity:0;pointer-events:none;transition:all .28s ease;
  display:flex;align-items:center;gap:10px}
#toast.sh{transform:none;opacity:1}

<script>
'use strict';
const PROG=[{id:0,name:'Pecs / Triceps A',short:'Pecs · Triceps',exercises:[{name:'Développé Couché',sets:[{w:10,r:12},{w:22.5,r:10},{w:22.5,r:10},{w:22.5,r:10},{w:22.5,r:10}]},{name:'Développé Incliné',sets:[{w:12.5,r:10},{w:12.5,r:10},{w:12.5,r:10},{w:12.5,r:10}]},{name:'Développé Militaire',sets:[{w:12,r:10},{w:12,r:10},{w:12,r:10}]},{name:'Élévations Latérales',sets:[{w:8,r:15},{w:8,r:15},{w:8,r:15}]},{name:'Extension Triceps Dessus Tête',sets:[{w:12.5,r:12},{w:12.5,r:12},{w:12.5,r:12}]},{name:'Extension Triceps Corde',sets:[{w:12.5,r:12},{w:12.5,r:12},{w:12.5,r:12}]}]},{id:1,name:'Dos / Biceps A',short:'Dos · Biceps',exercises:[{name:'Spider Curl',sets:[{w:14,r:10},{w:14,r:10},{w:14,r:10},{w:12,r:12}]},{name:'Curl Incliné',sets:[{w:10,r:10},{w:10,r:10},{w:10,r:10},{w:10,r:10}]},{name:'Rowing Poulie Basse',sets:[{w:35,r:10},{w:35,r:10},{w:35,r:10}]},{name:'Remontée Haut Du Dos',sets:[{w:18,r:12},{w:18,r:12},{w:18,r:12}]},{name:'Face Pull',sets:[{w:25,r:15},{w:25,r:15},{w:25,r:15}]}]},{id:2,name:'Pecs / Triceps B',short:'Pecs · Triceps',exercises:[{name:'Développé Couché',sets:[{w:10,r:12},{w:22.5,r:10},{w:22.5,r:10},{w:22.5,r:10},{w:22.5,r:10}]},{name:'Développé Décliné',sets:[{w:17.5,r:10},{w:17.5,r:10},{w:17.5,r:10},{w:17.5,r:10}]},{name:'Développé Militaire',sets:[{w:12,r:10},{w:12,r:10},{w:12,r:10}]},{name:'Extension Triceps Dessus Tête',sets:[{w:12.5,r:12},{w:12.5,r:12},{w:12.5,r:12}]},{name:'Extension Triceps Corde',sets:[{w:12.5,r:12},{w:12.5,r:12},{w:12.5,r:12}]},{name:'Écartés Poulie Haute',sets:[{w:10,r:12},{w:7.5,r:12},{w:5,r:15}]}]},{id:3,name:'Dos / Biceps B',short:'Dos · Biceps',exercises:[{name:'Spider Curl',sets:[{w:14,r:10},{w:14,r:10},{w:14,r:10},{w:12,r:12}]},{name:'Curl Alterné',sets:[{w:14,r:10},{w:14,r:10},{w:14,r:10}]},{name:'Tirage Vertical',sets:[{w:45,r:10},{w:45,r:10},{w:45,r:10},{w:45,r:10}]},{name:'Pull Over Câble',sets:[{w:20,r:12},{w:20,r:12},{w:20,r:12}]},{name:'Reverse Pec Deck',sets:[{w:40,r:12},{w:40,r:12},{w:33,r:15},{w:33,r:15}]}]}];
const ALTS={'Développé Couché':['Développé Haltères','Pompes Lestées','Pec Deck Machine'],'Développé Incliné':['Incliné Haltères','Machine Inclinée','Poulie Inclinée'],'Développé Militaire':['Overhead Haltères','Arnold Press','Machine Épaules'],'Élévations Latérales':['Câble Latéral','Machine Latéral','Élévation 1 Bras'],'Extension Triceps Dessus Tête':['French Press','Corde Haute','Dips Lestés'],'Extension Triceps Corde':['Barre Triceps','Triceps Haltère','Push Down'],'Développé Décliné':['Décliné Haltères','Décliné Machine'],'Écartés Poulie Haute':['Pec Deck','Câble Croisé','Écartés Haltères'],'Spider Curl':['Curl Machine','Curl Concentré','Curl Barre EZ'],'Curl Incliné':['Curl Câble','Curl Marteau','Curl Barre'],'Curl Alterné':['Curl Simultané','Curl Marteau','Curl Câble 1 Bras'],'Rowing Poulie Basse':['Rowing Barre','Rowing Haltère','T-Bar Row'],'Remontée Haut Du Dos':['Shrug Haltères','Shrug Machine'],'Face Pull':['W-Pull Câble','Rear Delt Machine','Oiseau Câble'],'Tirage Vertical':['Tirage Neutre','Tirage Large','Tirage Serré'],'Pull Over Câble':['Pull Over Haltère','Tirage Droit Câble'],'Reverse Pec Deck':['Oiseau Haltère','Face Pull Écarté','Câble Arrière']};
const K={CFG:'ir_cfg',HIST:'ir_hist',WGT:'ir_wgt',ACT:'ir_act',BW:'ir_bw'};
const lJ=k=>{try{const d=localStorage.getItem(k);return d?JSON.parse(d):null;}catch(e){return null;}};
const sJ=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const lCfg=()=>lJ(K.CFG)||{startDate:new Date().toISOString().slice(0,10),increment:2.5};
const lHist=()=>lJ(K.HIST)||[];const lWgt=()=>lJ(K.WGT)||{};const lAct=()=>lJ(K.ACT)||null;const lBW=()=>lJ(K.BW)||[];
let curPage='home',pageStack=[],activeSess=null,sessTimerInt=null,sessSeconds=0;
let restState={active:false,interval:null,elapsed:0,countdown:null};
let swapTarget=null,progTab='body',progScale='all',progExercise=null,bwScale='3m';
function getTodayInfo(){const cfg=lCfg();const start=new Date(cfg.startDate);start.setHours(0,0,0,0);const today=new Date();today.setHours(0,0,0,0);const diff=Math.round((today-start)/86400000);const pos=((diff%3)+3)%3;if(pos===2)return{isRest:true,sessionIdx:null};const totalTrain=Math.floor(diff/3)*2+pos;return{isRest:false,sessionIdx:((totalTrain%4)+4)%4};}
const TABS=['home','history','progress','settings'];
function nav(page,params={},dir='tab'){
  if(page===curPage)return;
  if(!TABS.includes(page)){pageStack.push({page:curPage,params:{}});history.pushState({},'','#'+page);}
  else pageStack=[];
  const old=document.getElementById('pc');const nw=document.createElement('div');
  nw.id='pc';nw.className='page '+(dir==='back'?'sL':'sR');curPage=page;
  renderPage(nw,page,params);const pw=document.getElementById('pw');
  if(dir!=='tab'){old.className='page '+(dir==='back'?'xR':'xL');old.id='pc-old';}
  pw.appendChild(nw);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{nw.className='page sA';
    if(dir!=='tab')setTimeout(()=>{const e=document.getElementById('pc-old');if(e)e.remove();},330);else old.remove();}));
  updateNavUI(page);updateHdr(page,params);}
function goBack(){if(pageStack.length>0){const p=pageStack.pop();nav(p.page,p.params,'back');}else nav('home',{},'tab');}
function updateNavUI(page){TABS.forEach(t=>{const el=document.getElementById('ni-'+t);if(el)el.classList.toggle('on',t===page)});}
function updateHdr(page,params={}){const titles={home:'IRON',history:'Historique',progress:'Progrès',settings:'Réglages'};document.getElementById('ht').textContent=params.title||titles[page]||'IRON';document.getElementById('hl').innerHTML=(pageStack.length>0&&!TABS.includes(page))?'<button class="hdr-btn" onclick="goBack()">‹</button>':'';}
window.addEventListener('popstate',()=>goBack());
function renderPage(el,page,params){el.className='page sA';switch(page){case'home':el.innerHTML=buildHome();break;case'history':el.innerHTML=buildHistory();break;case'progress':buildProgressPage(el);break;case'settings':el.innerHTML=buildSettings();break;default:el.innerHTML=buildHome();}if(page==='progress')setTimeout(()=>drawActiveChart(),50);}
function buildHome(){const info=getTodayInfo();const hist=lHist();const act=lAct();const d=new Date();const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];const MTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];const dateStr=`${DAYS[d.getDay()]} ${d.getDate()} ${MTHS[d.getMonth()]} ${d.getFullYear()}`;const totalSess=hist.length;const totalSets=hist.reduce((a,s)=>a+s.exercises.reduce((b,e)=>b+e.sets.filter(x=>x.completed).length,0),0);let streak=0;if(hist.length>0){const t=new Date();t.setHours(0,0,0,0);let c=new Date(t);for(let i=hist.length-1;i>=0;i--){const dd=new Date(hist[i].date);dd.setHours(0,0,0,0);if(Math.round((c-dd)/86400000)<=1){streak++;c=dd;}else break;}}
let resumeHtml='';if(act){const p=PROG[act.sessionId];resumeHtml=`<div class="rb"><div class="rb-l">⚡ Séance en cours</div><div class="rb-n">${p?p.name:act.sessionName}</div><button class="btn btn-o" onclick="resumeSession()">▶ Reprendre</button></div>`;}
let todayHtml='';if(info.isRest){todayHtml=`<div class="rest-card"><div style="font-size:52px">😴</div><div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:var(--text-muted)">Jour de Repos</div><div style="font-size:13px;color:var(--text-muted)">Le muscle se construit au repos.</div><button class="btn btn-s" style="margin-top:4px" onclick="showSessionPicker()">Forcer une séance</button></div>`;}else{const s=PROG[info.sessionIdx];todayHtml=`<div class="today-card"><div class="tc-date">${dateStr}</div><div class="tc-num">SÉANCE ${info.sessionIdx+1}</div><div class="tc-name">${s.name}</div><div class="tc-tags"><span class="tag tag-a">${s.short.split('·')[0].trim()}</span><span class="tag tag-a">${s.short.split('·')[1].trim()}</span><span class="tag tag-g">${s.exercises.length} exercices · ${s.exercises.reduce((a,e)=>a+e.sets.length,0)} séries</span></div><button class="btn btn-p" onclick="startSession(${info.sessionIdx})">🏋️ Commencer</button></div>`;}
const statsHtml=`<div class="stats-row"><div class="sc"><div class="sc-v">${totalSess}</div><div class="sc-l">Séances</div></div><div class="sc"><div class="sc-v">${totalSets}</div><div class="sc-l">Séries</div></div><div class="sc"><div class="sc-v">${streak}</div><div class="sc-l">Streak 🔥</div></div></div>`;
let lastHtml='';if(hist.length>0){const last=hist[hist.length-1];const dur=last.duration?fmtTime(last.duration):'—';const done=last.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.completed).length,0);const tot=last.exercises.reduce((a,e)=>a+e.sets.length,0);const p=PROG[last.sessionId];lastHtml=`<div class="ls-card"><div class="ls-row"><div><div class="ls-name">${p?p.name:last.sessionName}</div><div class="ls-date">${relDate(new Date(last.date))} · ${dur}${last.avgRestTime?` · repos ${fmtTime(last.avgRestTime)}`:''}</div></div><div style="font-family:'DM Mono',monospace;font-size:13px;color:var(--accent)">${done}/${tot}</div></div><div class="prog-bar"><div class="prog-fill" style="width:${tot>0?Math.round(done/tot*100):0}%"></div></div></div>`;}
const allSess=PROG.map((s,i)=>`<button class="sso ${!info.isRest&&i===info.sessionIdx?'rec':''}" onclick="startSession(${i})"><div><div class="sso-n">Séance ${i+1} — ${s.name}</div><div class="sso-m">${s.exercises.length} exercices · ${s.exercises.reduce((a,e)=>a+e.sets.length,0)} séries</div></div>${!info.isRest&&i===info.sessionIdx?'<span class="badge">AUJOURD\'HUI</span>':'<span class="chevron">›</span>'}</button>`).join('');
return `<div class="pg gap stg">${resumeHtml}${todayHtml}${statsHtml}${lastHtml}<div><div class="lbl">Programme</div><div class="gap" style="gap:7px">${allSess}</div></div></div>`;}
function buildHistory(){const hist=lHist();if(!hist.length)return`<div class="pg"><div class="empty"><div class="empty-ic">📋</div><div class="empty-t">Aucune séance</div><div class="empty-d">Tes séances apparaîtront ici.</div></div></div>`;const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];const MTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];const rows=[...hist].reverse().map((s)=>{const p=PROG[s.sessionId];const d=new Date(s.date);const done=s.exercises.reduce((a,e)=>a+e.sets.filter(x=>x.completed).length,0);const tot=s.exercises.reduce((a,e)=>a+e.sets.length,0);const vol=s.exercises.reduce((a,e)=>a+e.sets.filter(x=>x.completed).reduce((b,x)=>b+(x.weight*(x.reps||10)),0),0);const exRows=s.exercises.map(e=>{const sh=e.sets.map(st=>`<span class="hd-set ${st.completed?'done':''}">${st.weight}kg×${st.reps||10}</span>`).join('');return`<div class="hd-ex"><div class="hd-exname">${e.name}</div><div class="hd-sets">${sh}</div></div>`;}).join('');return`<div class="hc" onclick="this.classList.toggle('exp')"><div class="hc-acc"></div><div style="padding-left:8px"><div class="hc-top"><div class="hc-name">${p?p.name:s.sessionName}</div><div class="hc-date">${DAYS[d.getDay()]} ${d.getDate()} ${MTHS[d.getMonth()]}</div></div><div class="hc-stats"><span class="hc-st">⏱ <b>${s.duration?fmtTime(s.duration):'—'}</b></span><span class="hc-st">✓ <b>${done}/${tot}</b></span><span class="hc-st">📦 <b>${Math.round(vol)}kg</b></span>${s.avgRestTime?`<span class="hc-st">⏸ <b>${fmtTime(s.avgRestTime)}</b></span>`:''}</div><div class="hc-det">${exRows}</div></div></div>`;}).join('');return`<div class="pg gap stg">${rows}</div>`;}
function buildProgressPage(el){el.innerHTML=`<div id="prog-wrap"><div class="ptabs"><button class="ptab ${progTab==='body'?'on':''}" onclick="setPTab('body')">💪 Poids de corps</button><button class="ptab ${progTab==='exercise'?'on':''}" onclick="setPTab('exercise')">📈 Exercices</button></div><div class="pcon" id="pcon"></div></div>`;buildProgContent();}
function setPTab(t){progTab=t;document.querySelectorAll('.ptab').forEach((b,i)=>b.classList.toggle('on',['body','exercise'][i]===t));buildProgContent();}
function buildProgContent(){const el=document.getElementById('pcon');if(!el)return;if(progTab==='body'){el.innerHTML=buildBWContent();setTimeout(()=>drawBWChart(),50);}else{el.innerHTML=buildExContent();setTimeout(()=>drawActiveChart(),50);}}
function buildBWContent(){const bw=lBW();const today=new Date().toISOString().slice(0,10);const todayE=bw.find(x=>x.date===today);let stats='';if(bw.length>=2){const delta=bw[bw.length-1].weight-bw[0].weight;const ds=(delta>=0?'+':'')+delta.toFixed(1)+'kg';stats=`<div style="display:flex;gap:10px;margin-top:10px"><div class="sc" style="flex:1"><div class="sc-v">${bw[bw.length-1].weight}</div><div class="sc-l">Actuel kg</div></div><div class="sc" style="flex:1"><div class="sc-v">${bw[0].weight}</div><div class="sc-l">Départ kg</div></div><div class="sc" style="flex:1"><div class="sc-v" style="color:${delta>=0?'var(--red)':'var(--accent)'}">${ds}</div><div class="sc-l">Évolution</div></div></div>`;}
const scales=[['7j','7J'],['30j','30J'],['3m','3M'],['1an','1An'],['all','Tout']];const sp=scales.map(([v,l])=>`<button class="ts-pill ${bwScale===v?'on':''}" onclick="setBWScale('${v}')">${l}</button>`).join('');
return`<div class="bw-input-card"><div class="lbl">Poids aujourd'hui</div><div class="bw-row"><button class="wb" style="width:36px;height:36px" onclick="adjBW(-0.5)">−</button><input type="number" class="bw-inp" id="bw-inp" step="0.1" placeholder="75.0" value="${todayE?todayE.weight:''}" onchange="saveBW(this.value)"><span class="bw-unit">kg</span><button class="wb" style="width:36px;height:36px" onclick="adjBW(0.5)">+</button></div><button class="btn btn-p" style="margin-top:12px" onclick="saveBW(document.getElementById('bw-inp').value)">Enregistrer</button>${stats}</div><div><div class="lbl">Courbe de poids</div><div class="ts-row">${sp}</div></div><div class="cc"><div class="chart-box" style="height:150px"><canvas class="ch" id="bw-chart"></canvas></div></div>`;}
function setBWScale(s){bwScale=s;document.querySelectorAll('.ts-pill').forEach(b=>{const m=b.getAttribute('onclick').match(/'([^']+)'/);if(m)b.classList.toggle('on',m[1]===s);});drawBWChart();}
function saveBW(val){const w=parseFloat(val);if(!w||w<20||w>300){toast('⚠️','Poids invalide','err');return;}const bw=lBW();const today=new Date().toISOString().slice(0,10);const idx=bw.findIndex(x=>x.date===today);if(idx>=0)bw[idx].weight=w;else bw.push({date:today,weight:w});bw.sort((a,b)=>a.date.localeCompare(b.date));sJ(K.BW,bw);const inp=document.getElementById('bw-inp');if(inp)inp.value=w;drawBWChart();toast('✓',`${w} kg enregistré`,'succ');}
function adjBW(d){const inp=document.getElementById('bw-inp');const cur=parseFloat(inp.value)||70;inp.value=Math.round((cur+d)*10)/10;}
function drawBWChart(){const canvas=document.getElementById('bw-chart');if(!canvas)return;const allBW=lBW();const data=filterByScale(allBW.map(x=>({date:x.date,val:x.weight})),bwScale);if(data.length<2){const ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1;canvas.width=(canvas.parentElement.offsetWidth||300)*dpr;canvas.height=150*dpr;ctx.scale(dpr,dpr);ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='12px DM Sans,sans-serif';ctx.textAlign='center';ctx.fillText('Pas assez de données',canvas.width/dpr/2,75);return;}drawLineChart(canvas,data,'#38bdf8',150);}
function buildExContent(){const hist=lHist();const allEx={};PROG.forEach(s=>s.exercises.forEach(e=>{if(!allEx[e.name])allEx[e.name]=[];}));hist.forEach(s=>s.exercises.forEach(e=>{if(!allEx[e.name])allEx[e.name]=[];const done=e.sets.filter(x=>x.completed);if(done.length>0){const avg=done.reduce((a,x)=>a+x.weight,0)/done.length;allEx[e.name].push({date:s.date,val:parseFloat(avg.toFixed(1))});}}));
const scales=[['7j','7J'],['30j','30J'],['3m','3M'],['1an','1An'],['all','Tout']];const sp=scales.map(([v,l])=>`<button class="ts-pill ${progScale===v?'on':''}" onclick="setProgScale('${v}')">${l}</button>`).join('');
const exNames=Object.keys(allEx);if(!progExercise||!exNames.includes(progExercise))progExercise=exNames[0]||null;
const exListHtml=exNames.map(name=>{const dta=allEx[name];const cur=dta.length>0?dta[dta.length-1].val+'kg':'—';return`<button class="ex-sel-card ${name===progExercise?'sso rec':''}" onclick="selectProgEx('${name.replace(/'/g,"\\'")}')"><div><div style="font-weight:600;font-size:13px">${name}</div><div style="font-size:11px;color:var(--text-muted)">${dta.length} séances</div></div><div style="font-family:'DM Mono',monospace;font-size:14px;color:var(--accent)">${cur}</div></button>`;}).join('');
let chartHtml='';if(progExercise&&allEx[progExercise]){const wgt=lWgt();const curW=wgt[progExercise];const curWStr=curW?curW.map(s=>typeof s==='object'?s.w:s).filter((_,i)=>i>0)[0]+'kg':'—';const data=filterByScale(allEx[progExercise],progScale);const delta=data.length>=2?(data[data.length-1].val-data[0].val).toFixed(1):null;chartHtml=`<div class="cc"><div class="cc-hdr"><div class="cc-name">${progExercise}</div><div class="cc-val"><div class="cc-kg">${curWStr}</div>${delta!==null?`<div class="cc-delta ${delta<0?'neg':''}">${delta>=0?'+':''}${delta}kg</div>`:''}</div></div><div class="chart-box" style="height:140px"><canvas class="ch" id="ex-chart"></canvas></div></div>`;}
return`<div>${chartHtml}</div><div><div class="lbl">Échelle de temps</div><div class="ts-row">${sp}</div></div><div><div class="lbl">Exercices</div><div class="gap" style="gap:7px">${exListHtml||'<div class="empty"><div class="empty-ic">📈</div><div class="empty-t">Aucune donnée</div></div>'}</div></div>`;}
function setProgScale(s){progScale=s;buildProgContent();}
function selectProgEx(name){progExercise=name;buildProgContent();}
function drawActiveChart(){if(progTab==='body'){drawBWChart();return;}const canvas=document.getElementById('ex-chart');if(!canvas||!progExercise)return;const hist=lHist();const data=[];hist.forEach(s=>s.exercises.forEach(e=>{if(e.name===progExercise){const done=e.sets.filter(x=>x.completed);if(done.length>0){const avg=done.reduce((a,x)=>a+x.weight,0)/done.length;data.push({date:s.date,val:parseFloat(avg.toFixed(1))});}}}));const filtered=filterByScale(data,progScale);if(filtered.length<2){const ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1;canvas.width=(canvas.parentElement.offsetWidth||300)*dpr;canvas.height=140*dpr;ctx.scale(dpr,dpr);ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='12px DM Sans,sans-serif';ctx.textAlign='center';ctx.fillText('Pas assez de données',canvas.width/dpr/2,70);return;}drawLineChart(canvas,filtered,'#aaff00',140);}
function filterByScale(data,scale){if(scale==='all')return data;const cutoffs={'7j':7,'30j':30,'3m':90,'1an':365};const days=cutoffs[scale]||9999;const cutoff=new Date(Date.now()-days*86400000);return data.filter(d=>new Date(d.date)>=cutoff);}
function drawLineChart(canvas,data,color,h=110){const dpr=window.devicePixelRatio||1;const rect=canvas.getBoundingClientRect();const W=rect.width||canvas.parentElement.offsetWidth||300;canvas.width=W*dpr;canvas.height=h*dpr;const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);const pad={t:8,r:8,b:26,l:40};const iW=W-pad.l-pad.r,iH=h-pad.t-pad.b;const vals=data.map(d=>d.val);const minV=Math.min(...vals),maxV=Math.max(...vals);const range=maxV-minV||1;const pts=data.map((d,i)=>({x:pad.l+(i/(data.length-1))*iW,y:pad.t+(1-(d.val-minV)/range)*iH,val:d.val,date:d.date}));ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;[0,.5,1].forEach(p=>{const y=pad.t+iH*p;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();});const cr=parseInt(color.slice(1,3),16),cg=parseInt(color.slice(3,5),16),cb=parseInt(color.slice(5,7),16);const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+iH);grad.addColorStop(0,`rgba(${cr},${cg},${cb},.22)`);grad.addColorStop(1,'rgba(0,0,0,0)');ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++){const cp=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cp,pts[i-1].y,cp,pts[i].y,pts[i].x,pts[i].y);}ctx.lineTo(pts[pts.length-1].x,pad.t+iH);ctx.lineTo(pts[0].x,pad.t+iH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++){const cp=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cp,pts[i-1].y,cp,pts[i].y,pts[i].x,pts[i].y);}ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();pts.forEach((p,i)=>{ctx.beginPath();ctx.arc(p.x,p.y,i===pts.length-1?4:2.5,0,Math.PI*2);ctx.fillStyle=i===pts.length-1?color:color+'88';ctx.fill();});ctx.fillStyle='rgba(255,255,255,0.28)';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';ctx.fillText(maxV,pad.l-4,pad.t+5);ctx.fillText(minV,pad.l-4,pad.t+iH);const MTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];const sf=new Date(data[0].date);const sl=new Date(data[data.length-1].date);ctx.textAlign='left';ctx.fillText(`${sf.getDate()} ${MTHS[sf.getMonth()]}`,pad.l,h-2);ctx.textAlign='right';ctx.fillText(`${sl.getDate()} ${MTHS[sl.getMonth()]}`,W-pad.r,h-2);}
function buildSettings(){const cfg=lCfg();return`<div class="pg gap stg"><div><div class="lbl">Configuration</div><div class="set-grp"><div class="set-item"><div><div class="set-lbl">Date de départ</div><div class="set-desc">Premier jour du cycle</div></div><input type="date" class="set-inp" value="${cfg.startDate}" onchange="updCfg('startDate',this.value)"></div><div class="set-item"><div><div class="set-lbl">Incrément</div><div class="set-desc">Progression par séance réussie</div></div><div class="set-ctrl"><button class="wb" onclick="updInc(-0.5)">−</button><span id="inc-v" style="font-family:'DM Mono',monospace;font-size:14px;min-width:50px;text-align:center">${cfg.increment} kg</span><button class="wb" onclick="updInc(0.5)">+</button></div></div></div></div><div><div class="lbl">Données</div><div class="set-grp"><div class="set-item" style="cursor:pointer" onclick="doRstW()"><div><div class="set-lbl" style="color:var(--orange)">Réinitialiser les poids</div><div class="set-desc">Revenir aux valeurs initiales</div></div><span style="color:var(--text-muted)">↺</span></div><div class="set-item" style="cursor:pointer" onclick="exportData()"><div><div class="set-lbl">Exporter JSON</div><div class="set-desc">Historique + poids + poids de corps</div></div><span style="color:var(--text-muted)">↑</span></div><div class="set-item" style="cursor:pointer" onclick="confirmReset()"><div><div class="set-lbl" style="color:var(--red)">Tout effacer</div><div class="set-desc">Irréversible</div></div><span style="color:var(--red)">⚠</span></div></div></div><div style="text-align:center;padding:8px 0"><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--accent);opacity:.35">IRON v2.0</div><div style="font-size:10px;color:var(--text-dim);margin-top:3px">PWA · localStorage · Offline</div></div></div>`;}
function updCfg(k,v){const c=lCfg();c[k]=v;sJ(K.CFG,c);toast('✓','Réglage sauvegardé','succ');}
function updInc(d){const c=lCfg();c.increment=Math.max(.5,Math.round((c.increment+d)*10)/10);sJ(K.CFG,c);const e=document.getElementById('inc-v');if(e)e.textContent=c.increment+' kg';}
function doRstW(){openMod(`<div class="sh-ttl">⚠ Réinitialiser les poids ?</div><p style="color:var(--text-muted);font-size:13px;margin-bottom:20px">Les poids reviendront aux valeurs initiales du programme.</p><div style="display:flex;gap:10px"><button class="btn btn-s" onclick="closeMod()">Annuler</button><button class="btn btn-d" onclick="localStorage.removeItem('${K.WGT}');closeMod();toast('✓','Poids réinitialisés','succ')">Réinitialiser</button></div>`);}

function exportData(){const d={config:lCfg(),history:lHist(),weights:lWgt(),bodyWeight:lBW(),date:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='iron-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);}
function startSession(idx){const wgt=lWgt();const p=PROG[idx];const exercises=p.exercises.map(ex=>{const saved=wgt[ex.name];const sets=saved?saved.map(s=>({weight:typeof s==='object'?s.w:s,reps:typeof s==='object'?s.r:10,completed:false,restSeconds:0})):ex.sets.map(s=>({weight:s.w,reps:s.r,completed:false,restSeconds:0}));return{name:ex.name,originalName:ex.name,isReplaced:false,sets};});activeSess={sessionId:idx,sessionName:p.name,date:new Date().toISOString().slice(0,10),startTime:Date.now(),exercises,elapsedSeconds:0,restTimes:[]};sJ(K.ACT,activeSess);openSessOv();}
function resumeSession(){activeSess=lAct();if(!activeSess)return;openSessOv();}
function openSessOv(){renderSessOv();document.getElementById('sess-ov').classList.add('open');startSessTimer();}
function renderSessOv(){const s=activeSess;if(!s)return;const p=PROG[s.sessionId]||{name:s.sessionName};document.getElementById('sess-title').textContent=p.name;document.getElementById('sb').innerHTML=buildSessEx(s)+`<button class="add-ex-btn" onclick="openAddEx()">＋ Ajouter un exercice</button>`;updateSessProg();sessSeconds=s.elapsedSeconds||0;updateSessTimerDisp();}
function buildSessEx(s){return s.exercises.map((ex,ei)=>{const done=ex.sets.filter(x=>x.completed).length,tot=ex.sets.length,allDone=done===tot;const setsHtml=ex.sets.map((st,si)=>`<div class="sr ${st.completed?'ok':''}" id="sr-${ei}-${si}"><div class="sn">S${si+1}</div><div class="wg"><button class="wb" onclick="adjW(${ei},${si},-0.5)">−</button><div class="wi-w"><input type="number" class="wi" value="${st.weight}" step="0.5" min="0" onchange="updW(${ei},${si},this.value)" inputmode="decimal"><span class="wu">kg</span></div><button class="wb" onclick="adjW(${ei},${si},0.5)">+</button></div><div class="rdiv"></div><div class="rg"><button class="rb2" onclick="adjR(${ei},${si},-1)">−</button><input type="number" class="ri" value="${st.reps||10}" min="1" max="100" onchange="updR(${ei},${si},this.value)" inputmode="numeric"><span class="rx">×</span><button class="rb2" onclick="adjR(${ei},${si},1)">+</button></div><button class="ck" id="ck-${ei}-${si}" onclick="toggleSet(${ei},${si})">✓</button></div>`).join('');return`<div class="ec ${allDone?'done':''}" id="ec-${ei}"><div class="ec-hdr" onclick="toggleEx(${ei})"><div class="ec-info"><div class="ec-name">${ex.name}${ex.isReplaced?` <span style="font-size:10px;color:var(--orange)">↔</span>`:''}</div><div class="ec-meta">${tot} séries · ${ex.sets.map(s=>s.weight+'kg').join(' / ')}</div></div><div class="ec-right"><button class="ec-swap" onclick="event.stopPropagation();openSwap(${ei})">↔</button><button class="ec-del" onclick="event.stopPropagation();delEx(${ei})">✕</button><span class="sdg ${allDone?'full':''}">${done}/${tot}</span><span class="arr ${ei===0?'up':''}" id="arr-${ei}">▾</span></div></div><div class="ec-sets" id="ecs-${ei}" style="${ei===0?'':'display:none'}">${setsHtml}</div></div>`;}).join('');}
function toggleEx(ei){const sets=document.getElementById('ecs-'+ei),arr=document.getElementById('arr-'+ei);const open=sets.style.display!=='none';sets.style.display=open?'none':'block';arr.classList.toggle('up',!open);}
function toggleSet(ei,si){if(!activeSess)return;const st=activeSess.exercises[ei].sets[si];st.completed=!st.completed;sJ(K.ACT,activeSess);const row=document.getElementById('sr-'+ei+'-'+si);const btn=document.getElementById('ck-'+ei+'-'+si);row.classList.toggle('ok',st.completed);btn.classList.add('pop');setTimeout(()=>btn.classList.remove('pop'),300);const ex=activeSess.exercises[ei];const done=ex.sets.filter(x=>x.completed).length,tot=ex.sets.length;const sdg=document.querySelector('#ec-'+ei+' .sdg');if(sdg){sdg.textContent=done+'/'+tot;sdg.classList.toggle('full',done===tot);}document.getElementById('ec-'+ei)?.classList.toggle('done',done===tot);updateSessProg();if(st.completed)startRest();else stopRest();}
function updW(ei,si,val){if(!activeSess)return;activeSess.exercises[ei].sets[si].weight=parseFloat(val)||0;sJ(K.ACT,activeSess);}
function adjW(ei,si,d){if(!activeSess)return;const s=activeSess.exercises[ei].sets[si];s.weight=Math.max(0,Math.round((s.weight+d)*10)/10);const inp=document.querySelector('#sr-'+ei+'-'+si+' .wi');if(inp)inp.value=s.weight;updW(ei,si,s.weight);}
function updR(ei,si,val){if(!activeSess)return;activeSess.exercises[ei].sets[si].reps=parseInt(val)||1;sJ(K.ACT,activeSess);}

function updateSessProg(){if(!activeSess)return;let done=0,tot=0;activeSess.exercises.forEach(ex=>{done+=ex.sets.filter(s=>s.completed).length;tot+=ex.sets.length;});const pct=tot>0?Math.round(done/tot*100):0;document.getElementById('sess-prog-f').style.width=pct+'%';document.getElementById('sess-prog-t').textContent=`${done} / ${tot} séries · ${pct}%`;const btn=document.getElementById('sf-btn');if(btn)btn.style.opacity=done>0?'1':'0.5';}
function delEx(ei){openMod(`<div class="sh-ttl">Supprimer l'exercice ?</div><p style="color:var(--text-muted);font-size:13px;margin-bottom:20px">"${activeSess.exercises[ei].name}"</p><div style="display:flex;gap:10px"><button class="btn btn-s" onclick="closeMod()">Annuler</button><button class="btn btn-d" onclick="doDelEx(${ei})">Supprimer</button></div>`);}
function doDelEx(ei){if(!activeSess)return;activeSess.exercises.splice(ei,1);sJ(K.ACT,activeSess);closeMod();const sb=document.getElementById('sb');sb.innerHTML=buildSessEx(activeSess)+`<button class="add-ex-btn" onclick="openAddEx()">＋ Ajouter un exercice</button>`;updateSessProg();toast('✓','Exercice supprimé','succ');}
function openAddEx(){const allEx=[];PROG.forEach(p=>p.exercises.forEach(e=>{if(!allEx.includes(e.name))allEx.push(e.name);}));const sugHtml=allEx.map(n=>`<button class="sw-btn" onclick="addEx('${n.replace(/'/g,"\\'")}')"><span>💪</span>${n}</button>`).join('');openMod(`<div class="sh-ttl">Ajouter un exercice</div><div class="sw-inp-w"><span style="color:var(--text-muted)">✏️</span><input type="text" class="sw-inp" id="add-ex-inp" placeholder="Nom personnalisé..."></div><button class="btn btn-p" style="margin-bottom:14px" onclick="addEx(document.getElementById('add-ex-inp').value)">Ajouter</button><div class="lbl">Exercices du programme</div><div class="sw-sugg">${sugHtml}</div>`);}
function addEx(name){name=(name||'').trim();if(!name){toast('⚠️','Entre un nom','err');return;}if(!activeSess)return;let defSets=[{weight:20,reps:10,completed:false,restSeconds:0},{weight:20,reps:10,completed:false,restSeconds:0},{weight:20,reps:10,completed:false,restSeconds:0}];PROG.forEach(p=>p.exercises.forEach(e=>{if(e.name===name)defSets=e.sets.map(s=>({weight:s.w,reps:s.r,completed:false,restSeconds:0}));}));const saved=lWgt()[name];if(saved)defSets=saved.map(s=>({weight:typeof s==='object'?s.w:s,reps:typeof s==='object'?s.r:10,completed:false,restSeconds:0}));activeSess.exercises.push({name,originalName:name,isReplaced:false,sets:defSets});sJ(K.ACT,activeSess);closeMod();const sb=document.getElementById('sb');sb.innerHTML=buildSessEx(activeSess)+`<button class="add-ex-btn" onclick="openAddEx()">＋ Ajouter un exercice</button>`;updateSessProg();toast('✓',`${name} ajouté`,'succ');}
function openSwap(ei){if(!activeSess)return;swapTarget=ei;const ex=activeSess.exercises[ei];const alts=ALTS[ex.originalName]||[];const altHtml=alts.map(a=>`<button class="sw-btn" onclick="confirmSwap('${a.replace(/'/g,"\\'")}')"><span>💪</span>${a}</button>`).join('');openMod(`<div class="sh-ttl">Remplacer l'exercice</div><div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Actuellement : <b style="color:var(--text)">${ex.name}</b></div><div class="sw-inp-w"><span style="color:var(--text-muted)">✏️</span><input type="text" class="sw-inp" id="sw-inp" placeholder="Nom personnalisé..."></div><button class="btn btn-p" style="margin-bottom:14px" onclick="confirmSwap(document.getElementById('sw-inp').value)">Confirmer</button>${alts.length?`<div class="lbl">Suggestions</div><div class="sw-sugg">${altHtml}</div>`:''}`);} 
function confirmSwap(name){name=(name||'').trim();if(!name){toast('⚠️','Entre un nom','err');return;}if(swapTarget===null||!activeSess)return;const ex=activeSess.exercises[swapTarget];ex.name=name;ex.isReplaced=true;sJ(K.ACT,activeSess);closeMod();const nameEl=document.querySelector('#ec-'+swapTarget+' .ec-name');if(nameEl)nameEl.innerHTML=name+' <span style="font-size:10px;color:var(--orange)">↔</span>';swapTarget=null;toast('↔','Exercice remplacé','succ');}
function closeSession(){if(activeSess){activeSess.elapsedSeconds=sessSeconds;sJ(K.ACT,activeSess);}stopSessTimer();stopRest();document.getElementById('sess-ov').classList.remove('open');if(curPage==='home')document.getElementById('pc').innerHTML=buildHome();}
function finishSession(){if(!activeSess)return;const done=activeSess.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.completed).length,0);if(!done){toast('⚠️','Complète au moins une série','err');return;}stopSessTimer();stopRest();activeSess.duration=sessSeconds;const avg=activeSess.restTimes.length>0?Math.round(activeSess.restTimes.reduce((a,x)=>a+x,0)/activeSess.restTimes.length):0;activeSess.avgRestTime=avg;const cfg=lCfg();const wgt=lWgt();const inc=cfg.increment||2.5;let progCount=0;activeSess.exercises.forEach(ex=>{const allDone=ex.sets.every(s=>s.completed);if(allDone){wgt[ex.name]=ex.sets.map(s=>({w:Math.round((s.weight+inc)*10)/10,r:s.reps}));progCount++;}else{wgt[ex.name]=ex.sets.map(s=>({w:s.weight,r:s.reps}));}});sJ(K.WGT,wgt);const hist=lHist();hist.push({sessionId:activeSess.sessionId,sessionName:activeSess.sessionName,date:activeSess.date,duration:activeSess.duration,avgRestTime:avg,exercises:activeSess.exercises.map(ex=>({name:ex.name,originalName:ex.originalName,isReplaced:ex.isReplaced,sets:ex.sets.map(s=>({weight:s.weight,reps:s.reps,completed:s.completed}))}))});sJ(K.HIST,hist);sJ(K.ACT,null);const dur=sessSeconds;activeSess=null;document.querySelector('#ni-home .ndot')?.remove();document.getElementById('sb').innerHTML=`<div class="comp"><div class="comp-em cel">🏆</div><div class="comp-t">Séance finie !</div><div class="comp-s">${done} séries · ${fmtTime(dur)}${avg?` · repos moy. ${fmtTime(avg)}`:''}</div>${progCount>0?`<div class="prog-note"><b>+${inc}kg sur ${progCount} exercice${progCount>1?'s':''} !</b><small>Progression appliquée automatiquement</small></div>`:''}</div>`;document.getElementById('sf-btn').textContent='✕ Fermer';document.getElementById('sf-btn').onclick=()=>{document.getElementById('sess-ov').classList.remove('open');if(curPage==='home')document.getElementById('pc').innerHTML=buildHome();};launchConfetti();}
function startSessTimer(){stopSessTimer();sessTimerInt=setInterval(()=>{sessSeconds++;updateSessTimerDisp();},1000);}
function stopSessTimer(){if(sessTimerInt){clearInterval(sessTimerInt);sessTimerInt=null;}}
function updateSessTimerDisp(){const e=document.getElementById('sess-timer');if(e)e.textContent=fmtTime(sessSeconds);}
function startRest(){stopRest();restState={active:true,elapsed:0,countdown:null,interval:null};restState.interval=setInterval(()=>{restState.elapsed++;updateRestDisp();if(restState.countdown!==null&&restState.elapsed>=restState.countdown){if(navigator.vibrate)navigator.vibrate([200,100,200]);stopRest();toast('⏰','Fin du repos !','succ');}},1000);document.getElementById('rest-strip').classList.add('vis');updateRestDisp();}
function stopRest(){if(restState.interval){clearInterval(restState.interval);restState.interval=null;}if(restState.active&&restState.elapsed>3&&activeSess){activeSess.restTimes=activeSess.restTimes||[];activeSess.restTimes.push(restState.elapsed);sJ(K.ACT,activeSess);}restState.active=false;document.getElementById('rest-strip').classList.remove('vis');}
function setRestCountdown(s){restState.countdown=s;if(restState.interval)clearInterval(restState.interval);restState.elapsed=0;restState.interval=setInterval(()=>{restState.elapsed++;updateRestDisp();if(restState.elapsed>=restState.countdown){if(navigator.vibrate)navigator.vibrate([200,100,200]);stopRest();toast('⏰','Fin du repos !','succ');}},1000);updateRestDisp();}
function updateRestDisp(){const el=document.getElementById('rst-t');if(!el)return;if(restState.countdown!==null){const rem=Math.max(0,restState.countdown-restState.elapsed);el.textContent=fmtTime(rem);el.style.color=rem<10?'var(--red)':'var(--orange)';}else{el.textContent=fmtTime(restState.elapsed);el.style.color='var(--orange)';}}
function openMod(html){document.getElementById('mc').innerHTML=html;document.getElementById('mbg').classList.add('open');document.getElementById('msh').classList.add('open');}
function closeMod(){document.getElementById('mbg').classList.remove('open');document.getElementById('msh').classList.remove('open');}
let toastTO=null;
function toast(ic,msg,type='succ'){document.getElementById('t-ic').textContent=ic;document.getElementById('t-msg').textContent=msg;const el=document.getElementById('toast');el.className='sh '+type;if(toastTO)clearTimeout(toastTO);toastTO=setTimeout(()=>el.className='',2400);}
function launchConfetti(){const c=document.getElementById('cvc');c.style.display='block';c.width=innerWidth;c.height=innerHeight;const ctx=c.getContext('2d');const p=Array.from({length:90},()=>({x:Math.random()*c.width,y:Math.random()*c.height-c.height,r:Math.random()*5+2,d:Math.random()*80+20,tilt:0,ta:Math.random()*.1,tai:(Math.random()*.07+.05),col:['#aaff00','#fff','#ffcc00','#ff4455','#38bdf8'][Math.floor(Math.random()*5)]}));let tick=0,angle=0;function draw(){ctx.clearRect(0,0,c.width,c.height);angle+=.01;tick++;p.forEach(x=>{x.ta+=x.tai;x.y+=Math.cos(angle+x.d)+2+x.r/2;x.x+=Math.sin(angle);x.tilt=Math.sin(x.ta)*15;ctx.beginPath();ctx.lineWidth=x.r/2;ctx.strokeStyle=x.col;ctx.moveTo(x.x+x.tilt+x.r/4,x.y);ctx.lineTo(x.x+x.tilt,x.y+x.tilt+x.r/4);ctx.stroke();});if(tick<220)requestAnimationFrame(draw);else{ctx.clearRect(0,0,c.width,c.height);c.style.display='none';}}requestAnimationFrame(draw);}
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return h>0?`${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}
function relDate(d){const t=new Date();t.setHours(0,0,0,0);const dd=new Date(d);dd.setHours(0,0,0,0);const diff=Math.round((t-dd)/86400000);if(diff===0)return"Aujourd'hui";if(diff===1)return"Hier";if(diff<7)return`Il y a ${diff}j`;const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'],MTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];return`${DAYS[d.getDay()]} ${d.getDate()} ${MTHS[d.getMonth()]}`;}
function showSessionPicker(){openMod(`<div class="sh-ttl">Choisir une séance</div><div class="sw-sugg">${PROG.map((s,i)=>`<button class="sw-btn" onclick="closeMod();startSession(${i})"><span>🏋️</span><div><div style="font-weight:600">${s.name}</div><div style="font-size:11px;color:var(--text-muted)">${s.exercises.length} exercices</div></div></button>`).join('')}</div>`);}
// SERVICE WORKER
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
// INIT
function init(){const act=lAct();if(act){activeSess=act;const dot=document.createElement('span');dot.className='ndot';document.getElementById('ni-home').appendChild(dot);}document.getElementById('pc').innerHTML=buildHome();}
init();
</script>
