<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IRON">
<meta name="theme-color" content="#0a0a0a">
<title>IRON — Workout Tracker</title>
<link id="pwa-manifest" rel="manifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#141414;--card:#1a1a1a;--card2:#202020;
  --border:#272727;--border2:#333;
  --accent:#aaff00;--accent-dim:rgba(170,255,0,.1);--accent-glow:rgba(170,255,0,.25);
  --red:#ff4455;--red-dim:rgba(255,68,85,.1);
  --orange:#ff8c00;--orange-dim:rgba(255,140,0,.1);
  --blue:#38bdf8;--blue-dim:rgba(56,189,248,.1);
  --text:#f0f0f0;--text-muted:#6b6b6b;--text-dim:#383838;
  --radius:18px;--radius-sm:11px;--radius-xs:7px;
  --nav-h:68px;--hdr-h:56px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --trans:300ms cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
button{border:none;background:none;color:inherit;font:inherit;cursor:pointer}
input{border:none;background:none;color:inherit;font:inherit;outline:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
*{-webkit-overflow-scrolling:touch;scrollbar-width:none}
::-webkit-scrollbar{display:none}

/* ── SHELL ── */
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
#hdr{height:calc(var(--hdr-h) + var(--st));padding-top:var(--st);display:flex;align-items:center;
  justify-content:space-between;padding-inline:18px;background:var(--bg);
  border-bottom:1px solid var(--border);z-index:10;flex-shrink:0}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--accent)}
.hdr-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .1s}
.hdr-btn:active{transform:scale(.91);background:var(--card2)}

/* ── PAGE WRAP ── */
#pw{flex:1;position:relative;overflow:hidden}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  padding-bottom:calc(var(--nav-h) + var(--sb) + 20px);
  transition:transform var(--trans),opacity var(--trans);will-change:transform}
.page.sR{transform:translateX(100%);opacity:0}
.page.sL{transform:translateX(-100%);opacity:0}
.page.sA{transform:none;opacity:1}
.page.xL{transform:translateX(-28%);opacity:0;pointer-events:none}
.page.xR{transform:translateX(28%);opacity:0;pointer-events:none}

/* ── NAV ── */
#nav{height:calc(var(--nav-h) + var(--sb));padding-bottom:var(--sb);background:var(--surface);
  border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);
  z-index:10;flex-shrink:0}
.ni{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--text-dim);transition:color var(--trans);position:relative}
.ni.on{color:var(--accent)}
.ni:active{opacity:.7}
.ni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ni span{font-size:9.5px;font-weight:600;letter-spacing:.6px;text-transform:uppercase}
.ndot{position:absolute;top:8px;right:calc(50% - 15px);width:7px;height:7px;
  border-radius:50%;background:var(--orange);animation:pdot 2s infinite}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}

/* ── GLOBAL BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--radius-sm);
  font-weight:600;font-size:15px;padding:15px 20px;transition:all .12s;width:100%}
.btn-p{background:var(--accent);color:#000;box-shadow:0 4px 20px var(--accent-glow)}
.btn-p:active{transform:scale(.97);box-shadow:0 2px 8px var(--accent-glow)}
.btn-s{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-s:active{transform:scale(.97);background:var(--border)}
.btn-d{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,68,85,.25)}
.btn-o{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,140,0,.25)}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}

/* ── PAGE PADDING ── */
.pg{padding:16px}
.gap{display:flex;flex-direction:column;gap:14px}

/* ── SECTION LABEL ── */
.lbl{font-size:10.5px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-muted);
  margin-bottom:8px;padding:0 2px}

/* ── HOME ── */
.today-card{background:linear-gradient(135deg,#1c1c1c,#111);border-radius:var(--radius);
  border:1px solid var(--border);padding:22px;position:relative;overflow:hidden}
.today-card::after{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;
  border-radius:50%;background:var(--accent-dim);filter:blur(50px);pointer-events:none}
.tc-date{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:6px}
.tc-num{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--accent);margin-bottom:2px}
.tc-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;line-height:1.1;margin-bottom:14px}
.tc-tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.tag{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.4px}
.tag-a{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(170,255,0,.2)}
.tag-g{background:var(--card2);color:var(--text-muted);border:1px solid var(--border)}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 10px;text-align:center}
.sc-v{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;line-height:1;margin-bottom:3px}
.sc-l{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px}

/* ── LAST SESSION ── */
.ls-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px 18px}
.ls-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ls-name{font-weight:600;font-size:14px}
.ls-date{font-size:11px;color:var(--text-muted)}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;box-shadow:0 0 6px var(--accent-glow)}

/* ── SESSION SELECTOR ── */
.sso{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  transition:all var(--trans)}
.sso:active{transform:scale(.98);border-color:var(--border2)}
.sso.rec{border-color:rgba(170,255,0,.3);background:var(--accent-dim)}
.sso-n{font-weight:600;font-size:14px}
.sso-m{font-size:11px;color:var(--text-muted);margin-top:2px}
.badge{font-size:9.5px;font-weight:700;padding:4px 8px;border-radius:20px;
  background:var(--accent);color:#000;letter-spacing:.4px}
.chevron{color:var(--text-muted);font-size:20px}

/* ── RESUME BANNER ── */
.rb{background:var(--orange-dim);border:1px solid rgba(255,140,0,.3);border-radius:var(--radius);
  padding:18px;display:flex;flex-direction:column;gap:10px}
.rb-l{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:1.2px;text-transform:uppercase}
.rb-n{font-weight:700;font-size:15px}

/* ─── REST CARD ─── */
.rest-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
  padding:32px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.rest-emoji{font-size:52px}
.rest-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:var(--text-muted)}

/* ════════════════════════════════════════
   SESSION OVERLAY
   ════════════════════════════════════════ */
#sess-ov{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform 420ms cubic-bezier(.4,0,.2,1);will-change:transform}
#sess-ov.open{transform:none}

.sh{padding:calc(var(--st) + 14px) 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sh-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sh-close{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .1s}
.sh-close:active{transform:scale(.9)}
.sh-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.sh-timer{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);
  background:var(--accent-dim);padding:4px 10px;border-radius:20px;border:1px solid rgba(170,255,0,.2)}
.sh-prog-t{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.sh-prog{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.sh-prog-f{height:100%;background:var(--accent);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px var(--accent-glow)}

/* ── REST TIMER STRIP ── */
#rest-strip{background:linear-gradient(90deg,var(--orange-dim),rgba(255,140,0,.05));
  border-bottom:1px solid rgba(255,140,0,.2);padding:10px 18px;flex-shrink:0;
  display:none;align-items:center;justify-content:space-between}
#rest-strip.vis{display:flex}
.rst-l{font-size:11px;color:var(--orange);font-weight:600;letter-spacing:.5px}
.rst-t{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--orange)}
.rst-presets{display:flex;gap:6px}
.rst-preset{font-size:10px;font-weight:700;padding:5px 9px;border-radius:20px;
  background:rgba(255,140,0,.12);color:var(--orange);border:1px solid rgba(255,140,0,.3);
  transition:all .1s}
.rst-preset:active{transform:scale(.93);background:rgba(255,140,0,.25)}
.rst-done{font-size:11px;font-weight:700;padding:7px 14px;border-radius:20px;
  background:var(--orange);color:#000;transition:all .1s}
.rst-done:active{transform:scale(.93)}

/* ── SESSION BODY ── */
#sb{flex:1;overflow-y:auto;padding:14px 16px}

/* ── EXERCISE CARDS ── */
.ec{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
  margin-bottom:10px;overflow:hidden;transition:border-color var(--trans)}
.ec.done{border-color:rgba(170,255,0,.35)}
.ec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 14px;cursor:pointer;user-select:none}
.ec-hdr:active{background:var(--card2)}
.ec-info{flex:1;min-width:0}
.ec-name{font-weight:700;font-size:14px;line-height:1.2;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ec-meta{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace}
.ec-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.ec-del{width:28px;height:28px;border-radius:50%;background:var(--red-dim);
  border:1px solid rgba(255,68,85,.2);display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--red);transition:all .1s}
.ec-del:active{transform:scale(.88)}
.ec-swap{width:28px;height:28px;border-radius:50%;background:var(--card2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text-muted);transition:all .1s}
.ec-swap:active{transform:scale(.88);color:var(--orange);border-color:var(--orange)}
.sdg{font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;
  background:var(--accent-dim);color:var(--accent);border:1px solid rgba(170,255,0,.2);
  font-family:'DM Mono',monospace}
.sdg.full{background:rgba(170,255,0,.18)}
.arr{color:var(--text-muted);font-size:13px;transition:transform var(--trans)}
.arr.up{transform:rotate(180deg)}

.ec-sets{border-top:1px solid var(--border);padding:10px 12px;display:flex;flex-direction:column;gap:7px}

/* ── SET ROW ── */
.sr{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--radius-sm);
  background:var(--card2);border:1px solid transparent;transition:all var(--trans)}
.sr.ok{background:rgba(170,255,0,.055);border-color:rgba(170,255,0,.18)}
.sn{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);width:22px;text-align:center;flex-shrink:0}
.wg{flex:1;display:flex;align-items:center;gap:5px}
.wb{width:28px;height:28px;border-radius:var(--radius-xs);background:var(--card);border:1px solid var(--border);
  font-size:17px;font-weight:300;color:var(--text-muted);display:flex;align-items:center;justify-content:center;
  transition:all .1s;flex-shrink:0}
.wb:active{transform:scale(.88);background:var(--border2);color:var(--text)}
.wi-w{flex:1;display:flex;align-items:center;justify-content:center;gap:2px}
.wi{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;text-align:center;
  width:48px;background:transparent;padding:2px 0}
.sr.ok .wi{color:var(--accent)}
.wu{font-size:10px;color:var(--text-muted)}
.rdiv{width:1px;height:22px;background:var(--border);flex-shrink:0}
.rg{display:flex;align-items:center;gap:4px;flex-shrink:0}
.rb2{width:24px;height:24px;border-radius:var(--radius-xs);background:var(--card);border:1px solid var(--border);
  font-size:14px;font-weight:300;color:var(--text-muted);display:flex;align-items:center;justify-content:center;
  transition:all .1s}
.rb2:active{transform:scale(.88);background:var(--border2)}
.ri{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;min-width:26px;text-align:center;
  background:transparent;color:var(--text)}
.sr.ok .ri{color:var(--accent)}
.rx{font-size:10px;color:var(--text-muted)}
.ck{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:transparent;
  display:flex;align-items:center;justify-content:center;font-size:15px;color:transparent;
  transition:all .2s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.ck:active{transform:scale(.85)}
.sr.ok .ck{border-color:var(--accent);background:var(--accent);color:#000}
@keyframes chk{0%{transform:scale(1)}35%{transform:scale(1.28)}65%{transform:scale(.92)}100%{transform:scale(1)}}
.ck.pop{animation:chk .3s ease}

/* ── ADD EXERCISE BTN ── */
.add-ex-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;
  border-radius:var(--radius);border:1.5px dashed var(--border2);color:var(--text-muted);
  font-size:14px;font-weight:500;transition:all var(--trans);margin-bottom:12px}
.add-ex-btn:active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* ── SESSION FOOTER ── */
#sf{padding:14px 16px;padding-bottom:calc(14px + var(--sb));border-top:1px solid var(--border);flex-shrink:0}

/* ═══════════════════════════════════════
   HISTORY
   ═══════════════════════════════════════ */
.hc{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
  padding:16px 18px;cursor:pointer;transition:all var(--trans);position:relative;overflow:hidden}
.hc:active{transform:scale(.985);border-color:var(--border2)}
.hc-acc{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:3px 0 0 3px}
.hc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hc-name{font-weight:700;font-size:14px}
.hc-date{font-size:11px;color:var(--text-muted)}
.hc-stats{display:flex;gap:14px;flex-wrap:wrap}
.hc-st{font-size:11.5px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.hc-st b{color:var(--text);font-family:'DM Mono',monospace}
.hc-det{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;
  display:none;flex-direction:column;gap:4px}
.hc.exp .hc-det{display:flex}
.hd-ex{display:flex;flex-direction:column;gap:2px;padding:8px 10px;
  background:var(--card2);border-radius:var(--radius-xs);border:1px solid var(--border)}
.hd-exname{font-size:12px;font-weight:600;margin-bottom:4px}
.hd-sets{display:flex;flex-wrap:wrap;gap:5px}
.hd-set{font-size:10.5px;font-family:'DM Mono',monospace;padding:3px 7px;border-radius:20px;
  background:var(--card);border:1px solid var(--border);color:var(--text-muted)}
.hd-set.done{background:var(--accent-dim);border-color:rgba(170,255,0,.2);color:var(--accent)}
.hc-rest-info{font-size:11px;color:var(--text-muted);margin-top:6px;
  display:flex;align-items:center;gap:5px}

/* ═══════════════════════════════════════
   PROGRESS
   ═══════════════════════════════════════ */
.ptabs{display:flex;gap:6px;padding:14px 16px 0;flex-shrink:0}
.ptab{flex:1;padding:9px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;
  letter-spacing:.6px;text-transform:uppercase;transition:all var(--trans);text-align:center;
  background:var(--card);border:1px solid var(--border);color:var(--text-muted)}
.ptab.on{background:var(--accent-dim);border-color:rgba(170,255,0,.3);color:var(--accent)}
.pcon{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:14px}

/* ── TIME SCALE PILLS ── */
.ts-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.ts-pill{font-size:11px;font-weight:700;padding:6px 12px;border-radius:20px;flex-shrink:0;
  background:var(--card);border:1px solid var(--border);color:var(--text-muted);transition:all var(--trans)}
.ts-pill.on{background:var(--accent-dim);border-color:rgba(170,255,0,.3);color:var(--accent)}

/* ── CHART CARD ── */
.cc{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px}
.cc-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.cc-name{font-weight:700;font-size:14px;flex:1;margin-right:10px}
.cc-val{text-align:right}
.cc-kg{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--accent)}
.cc-delta{font-size:10px;color:var(--accent);margin-top:1px}
.cc-delta.neg{color:var(--red)}
.chart-box{height:110px;position:relative}
canvas.ch{width:100%;height:100%}
.no-data{height:100%;display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);font-size:12px}

/* ── EXERCISE SELECTOR ── */
.ex-sel-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:all var(--trans)}
.ex-sel-card:active{transform:scale(.98);border-color:var(--border2)}

/* ── BODY WEIGHT ── */
.bw-input-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:18px}
.bw-row{display:flex;align-items:center;gap:10px;margin-top:12px}
.bw-inp{flex:1;font-family:'DM Mono',monospace;font-size:28px;font-weight:500;
  text-align:center;color:var(--text)}
.bw-unit{font-size:14px;color:var(--text-muted);font-weight:500}
.bw-today{font-size:11px;color:var(--text-muted);margin-top:4px;text-align:center}

/* ═══════════════════════════════════════
   SETTINGS
   ═══════════════════════════════════════ */
.set-grp{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.set-item{background:var(--card);padding:15px 18px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border)}
.set-item:last-child{border-bottom:none}
.set-lbl{font-weight:500;font-size:14px}
.set-desc{font-size:11px;color:var(--text-muted);margin-top:2px}
.set-ctrl{display:flex;align-items:center;gap:8px}
.set-inp{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-xs);
  padding:7px 10px;font-size:13px;color:var(--text);text-align:right}

/* ═══════════════════════════════════════
   MODAL / BOTTOM SHEET
   ═══════════════════════════════════════ */
#mbg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);
  z-index:200;opacity:0;pointer-events:none;transition:opacity var(--trans)}
#mbg.open{opacity:1;pointer-events:all}
#msh{position:fixed;bottom:0;left:0;right:0;background:var(--surface);
  border-radius:22px 22px 0 0;z-index:201;padding:18px 18px calc(18px + var(--sb));
  transform:translateY(100%);transition:transform 360ms cubic-bezier(.4,0,.2,1);
  max-height:85vh;overflow-y:auto}
#msh.open{transform:none}
.sh-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.sh-ttl{font-weight:700;font-size:18px;margin-bottom:16px}

/* ── SWAP ── */
.sw-inp-w{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 14px;gap:10px;margin-bottom:14px}
.sw-inp{flex:1;font-size:15px}
.sw-sugg{display:flex;flex-direction:column;gap:7px}
.sw-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;text-align:left;font-size:13px;display:flex;align-items:center;gap:10px;transition:all var(--trans)}
.sw-btn:active{background:var(--card2);border-color:var(--accent)}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--sb) + 14px);left:16px;right:16px;
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);
  padding:13px 16px;font-size:13px;font-weight:600;z-index:400;
  transform:translateY(14px);opacity:0;pointer-events:none;transition:all .28s ease;
  display:flex;align-items:center;gap:10px}
#toast.sh{transform:none;opacity:1}
#toast.succ{border-color:rgba(170,255,0,.35)}
#toast.err{border-color:rgba(255,68,85,.35)}

/* ── CONFETTI ── */
#cvc{position:fixed;inset:0;z-index:500;pointer-events:none;display:none}

/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;gap:10px;text-align:center}
.empty-ic{font-size:46px;opacity:.35}
.empty-t{font-size:17px;font-weight:600;color:var(--text-muted)}
.empty-d{font-size:12px;color:var(--text-dim)}

/* ── STAGGER ── */
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.stg>*{opacity:0;animation:fu .38s ease forwards}
.stg>*:nth-child(1){animation-delay:.04s}.stg>*:nth-child(2){animation-delay:.09s}
.stg>*:nth-child(3){animation-delay:.14s}.stg>*:nth-child(4){animation-delay:.19s}
.stg>*:nth-child(5){animation-delay:.24s}.stg>*:nth-child(6){animation-delay:.29s}
.stg>*:nth-child(7){animation-delay:.34s}.stg>*:nth-child(8){animation-delay:.39s}

/* ── COMPLETION ── */
.comp{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;gap:14px;text-align:center;flex:1}
.comp-em{font-size:72px}
.comp-t{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;color:var(--accent)}
.comp-s{font-size:14px;color:var(--text-muted)}
.prog-note{background:var(--accent-dim);border:1px solid rgba(170,255,0,.2);
  border-radius:var(--radius-sm);padding:14px 18px;margin-top:6px;text-align:center}
.prog-note b{color:var(--accent)}
.prog-note small{font-size:11px;color:var(--text-muted);display:block;margin-top:2px}

@keyframes cel{0%{transform:scale(.5) rotate(-5deg);opacity:0}50%{transform:scale(1.1) rotate(2deg);opacity:1}100%{transform:scale(1);opacity:1}}
.cel{animation:cel .5s ease forwards}

/* ── PBAR ── */
.pbar{display:flex;flex-direction:column;gap:6px;padding:8px 14px;
  background:var(--card2);border-radius:var(--radius-xs};border:1px solid var(--border)}

/* ── PROG PAGE INNER PAGES ── */
#prog-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.prog-pg{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:14px 16px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div id="hl"></div>
    <div class="hdr-title" id="ht">IRON</div>
    <div id="hr"></div>
  </div>
  <div id="pw"><div id="pc" class="page sA"></div></div>
  <nav id="nav">
    <button class="ni on" id="ni-home" onclick="nav('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Accueil</span>
    </button>

    <button class="ni" id="ni-settings" onclick="nav('settings')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span>Réglages</span>
    </button>
  </nav>
</div>

<!-- SESSION OVERLAY -->
<div id="sess-ov">
  <div class="sh">
    <div class="sh-top">
      <button class="sh-close" onclick="closeSession()">✕</button>
      <div class="sh-name" id="sess-title">Séance</div>
      <div class="sh-timer" id="sess-timer">00:00</div>
    </div>
    <div class="sh-prog-t" id="sess-prog-t">0 / 0 séries</div>
    <div class="sh-prog"><div class="sh-prog-f" id="sess-prog-f" style="width:0%"></div></div>
  </div>
  <!-- REST STRIP -->

    <div>
      <div class="rst-l">⏸ Repos</div>
      <div class="rst-t" id="rst-t">0:00</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
      <div class="rst-presets">
        <button class="rst-preset" onclick="setRestCountdown(60)">1'</button>
        <button class="rst-preset" onclick="setRestCountdown(90)">1'30</button>
        <button class="rst-preset" onclick="setRestCountdown(120)">2'</button>
        <button class="rst-preset" onclick="setRestCountdown(180)">3'</button>
      </div>
      <button class="rst-done" onclick="stopRest()">Prêt ! ✓</button>

  </div>
  <div id="sb"></div>
  <div id="sf">
    <button class="btn btn-p" id="sf-btn" onclick="finishSession()">🏁 Terminer la séance</button>

</div>

<!-- Modal -->
<div id="mbg" onclick="closeMod()"></div>
<div id="msh"><div class="sh-handle"></div><div id="mc"></div></div>

<!-- Toast -->
<div id="toast"><span id="t-ic"></span><span id="t-msg"></span></div>

<!-- Confetti -->
<canvas id="cvc"></canvas>

<script>
'use strict';
// ══════════════════════════════════════
// PROGRAM DATA
// ══════════════════════════════════════
const PROG = [
  { id:0, name:'Pecs / Triceps A', short:'Pecs · Triceps', exercises:[
    { name:'Développé Couché',              sets:[{w:10,r:12},{w:22.5,r:10},{w:22.5,r:10},{w:22.5,r:10},{w:22.5,r:10}]},

    { name:'Développé Militaire',           sets:[{w:12,r:10},{w:12,r:10},{w:12,r:10}]},

    { name:'Extension Triceps Dessus Tête', sets:[{w:12.5,r:12},{w:12.5,r:12},{w:12.5,r:12}]},

  ]},
  { id:1, name:'Dos / Biceps A', short:'Dos · Biceps', exercises:[
    { name:'Spider Curl',         sets:[{w:14,r:10},{w:14,r:10},{w:14,r:10},{w:12,r:12}]},
    { name:'Curl Incliné',        sets:[{w:10,r:10},{w:10,r:10},{w:10,r:10},{w:10,r:10}]},
    { name:'Rowing Poulie Basse', sets:[{w:35,r:10},{w:35,r:10},{w:35,r:10}]},
    { name:'Remontée Haut Du Dos',sets:[{w:18,r:12},{w:18,r:12},{w:18,r:12}]},
    { name:'Face Pull',           sets:[{w:25,r:15},{w:25,r:15},{w:25,r:15}]},
  ]},
  { id:2, name:'Pecs / Triceps B', short:'Pecs · Triceps', exercises:[
    { name:'Développé Couché',              sets:[{w:10,r:12},{w:22.5,r:10},{w:22.5,r:10},{w:22.5,r:10},{w:22.5,r:10}]},
    { name:'Développé Décliné',             sets:[{w:17.5,r:10},{w:17.5,r:10},{w:17.5,r:10},{w:17.5,r:10}]},
    { name:'Développé Militaire',           sets:[{w:12,r:10},{w:12,r:10},{w:12,r:10}]},
    { name:'Extension Triceps Dessus Tête', sets:[{w:12.5,r:12},{w:12.5,r:12},{w:12.5,r:12}]},
    { name:'Extension Triceps Corde',       sets:[{w:12.5,r:12},{w:12.5,r:12},{w:12.5,r:12}]},
    { name:'Écartés Poulie Haute',          sets:[{w:10,r:12},{w:7.5,r:12},{w:5,r:15}]},
  ]},
  { id:3, name:'Dos / Biceps B', short:'Dos · Biceps', exercises:[
    { name:'Spider Curl',      sets:[{w:14,r:10},{w:14,r:10},{w:14,r:10},{w:12,r:12}]},
    { name:'Curl Alterné',     sets:[{w:14,r:10},{w:14,r:10},{w:14,r:10}]},
    { name:'Tirage Vertical',  sets:[{w:45,r:10},{w:45,r:10},{w:45,r:10},{w:45,r:10}]},
    { name:'Pull Over Câble',  sets:[{w:20,r:12},{w:20,r:12},{w:20,r:12}]},
    { name:'Reverse Pec Deck', sets:[{w:40,r:12},{w:40,r:12},{w:33,r:15},{w:33,r:15}]},
  ]},
];

const ALTS = {
  'Développé Couché':['Développé Haltères','Pompes Lestées','Pec Deck Machine'],
  'Développé Incliné':['Incliné Haltères','Machine Inclinée','Poulie Inclinée'],
  'Développé Militaire':['Overhead Haltères','Arnold Press','Machine Épaules'],
  'Élévations Latérales':['Câble Latéral','Machine Latéral','Élévation 1 Bras'],
  'Extension Triceps Dessus Tête':['French Press','Corde Haute','Dips Lestés'],
  'Extension Triceps Corde':['Barre Triceps','Triceps Haltère','Push Down'],
  'Développé Décliné':['Décliné Haltères','Décliné Machine'],
  'Écartés Poulie Haute':['Pec Deck','Câble Croisé','Écartés Haltères'],
  'Spider Curl':['Curl Machine','Curl Concentré','Curl Barre EZ'],
  'Curl Incliné':['Curl Câble','Curl Marteau','Curl Barre'],
  'Curl Alterné':['Curl Simultané','Curl Marteau','Curl Câble 1 Bras'],
  'Rowing Poulie Basse':['Rowing Barre','Rowing Haltère','T-Bar Row'],
  'Remontée Haut Du Dos':['Shrug Haltères','Shrug Machine'],
  'Face Pull':['W-Pull Câble','Rear Delt Machine','Oiseau Câble'],
  'Tirage Vertical':['Tirage Neutre','Tirage Large','Tirage Serré'],
  'Pull Over Câble':['Pull Over Haltère','Tirage Droit Câble'],
  'Reverse Pec Deck':['Oiseau Haltère','Face Pull Écarté','Câble Arrière'],
};

// ══════════════════════════════════════
// STORAGE KEYS
// ══════════════════════════════════════
const K = { CFG:'ir_cfg', HIST:'ir_hist', WGT:'ir_wgt', ACT:'ir_act', BW:'ir_bw' };
const loadJSON = k => { try { const d=localStorage.getItem(k); return d?JSON.parse(d):null; } catch(e){ return null; }};
const saveJSON = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const loadCfg  = () => loadJSON(K.CFG) || { startDate: new Date().toISOString().slice(0,10), increment: 2.5 };
const loadHist = () => loadJSON(K.HIST) || [];
const loadWgt  = () => loadJSON(K.WGT)  || {};
const loadAct  = () => loadJSON(K.ACT)  || null;
const loadBW   = () => loadJSON(K.BW)   || [];

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let curPage = 'home';
let pageStack = [];
let activeSess = null;
let sessTimerInt = null;
let sessSeconds = 0;
let restState = { active:false, interval:null, elapsed:0, countdown:null, lastSaved:0 };
let swapTarget = null;
let progTab = 'body';    // 'body' | 'exercise'
let progScale = 'all';   // '7j'|'30j'|'3m'|'1an'|'all'
let progExercise = null; // selected exercise name for chart
let bwScale = '3m';

// ══════════════════════════════════════
// CYCLE LOGIC
// ══════════════════════════════════════
function getTodayInfo() {
  const cfg = loadCfg();
  const start = new Date(cfg.startDate); start.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((today - start) / 86400000);
  const pos = ((diff % 3) + 3) % 3;
  if (pos === 2) return { isRest:true, sessionIdx:null };
  const totalTrain = Math.floor(diff/3)*2 + pos;
  return { isRest:false, sessionIdx: ((totalTrain % 4) + 4) % 4 };
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
const TABS = ['home','history','progress','settings'];

function nav(page, params={}, dir='tab') {
  if (page === curPage) return;
  if (!TABS.includes(page)) { pageStack.push({page:curPage, params:{}}); history.pushState({},'',' #'+page); }
  else { pageStack=[]; }

  const old = document.getElementById('pc');
  const nw = document.createElement('div');
  nw.id='pc'; nw.className='page '+(dir==='back'?'sL':'sR');
  curPage = page;
  renderPage(nw, page, params);
  const pw = document.getElementById('pw');
  if (dir !== 'tab') { old.className='page '+(dir==='back'?'xR':'xL'); old.id='pc-old'; }
  pw.appendChild(nw);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    nw.className='page sA';
    if (dir!=='tab') setTimeout(()=>{const e=document.getElementById('pc-old');if(e)e.remove();},330);
    else old.remove();
  }));
  updateNavUI(page); updateHdr(page, params);
}

function goBack() {
  if (pageStack.length>0) { const p=pageStack.pop(); nav(p.page,p.params,'back'); }
  else nav('home',{},'tab');
}

function updateNavUI(page) {
  TABS.forEach(t=>{
    const el=document.getElementById('ni-'+t);
    if (el) el.classList.toggle('on', t===page);
  });
}

function updateHdr(page, params={}) {
  const titles={home:'IRON',history:'Historique',progress:'Progrès',settings:'Réglages'};
  document.getElementById('ht').textContent = params.title || titles[page] || 'IRON';
  document.getElementById('hl').innerHTML = (pageStack.length>0&&!TABS.includes(page))
    ? `<button class="hdr-btn" onclick="goBack()">‹</button>` : '';
  document.getElementById('hr').innerHTML = '';
}

window.addEventListener('popstate', ()=>goBack());

// ══════════════════════════════════════
// PAGE ROUTER
// ══════════════════════════════════════
function renderPage(el, page, params) {
  el.className='page sA';
  switch(page) {
    case 'home':     el.innerHTML = buildHome(); break;
    case 'history':  el.innerHTML = buildHistory(); break;
    case 'progress': buildProgressPage(el); break;
    case 'settings': el.innerHTML = buildSettings(); break;
    default: el.innerHTML = buildHome();
  }
  if (page==='progress') setTimeout(()=>drawActiveChart(),50);
}

// ══════════════════════════════════════
// HOME
// ══════════════════════════════════════
function buildHome() {
  const info = getTodayInfo();
  const hist = loadHist();
  const cfg  = loadCfg();
  const act  = loadAct();
  const d = new Date();
  const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const MTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const dateStr = `${DAYS[d.getDay()]} ${d.getDate()} ${MTHS[d.getMonth()]} ${d.getFullYear()}`;
  const totalSess = hist.length;
  const totalSets = hist.reduce((a,s)=>a+s.exercises.reduce((b,e)=>b+e.sets.filter(x=>x.completed).length,0),0);
  let streak=0;
  if(hist.length>0){const t=new Date();t.setHours(0,0,0,0);let c=new Date(t);
    for(let i=hist.length-1;i>=0;i--){const dd=new Date(hist[i].date);dd.setHours(0,0,0,0);
      if(Math.round((c-dd)/86400000)<=1){streak++;c=dd;}else break;}}

  let resumeHtml='';
  if(act){ const p=PROG[act.sessionId];
    resumeHtml=`<div class="rb">
      <div class="rb-l">⚡ Séance en cours</div>
      <div class="rb-n">${p?p.name:act.sessionName}</div>
      <button class="btn btn-o" onclick="resumeSession()">▶ Reprendre</button>
    </div>`; }

  let todayHtml='';
  if(info.isRest){
    todayHtml=`<div class="rest-card">
      <div class="rest-emoji">😴</div>
      <div class="rest-title">Jour de Repos</div>
      <div style="font-size:13px;color:var(--text-muted)">Le muscle se construit au repos.</div>
      <button class="btn btn-s" style="margin-top:4px" onclick="showSessionPicker()">Forcer une séance</button>
    </div>`;
  } else {
    const s=PROG[info.sessionIdx];
    todayHtml=`<div class="today-card">
      <div class="tc-date">${dateStr}</div>
      <div class="tc-num">SÉANCE ${info.sessionIdx+1}</div>
      <div class="tc-name">${s.name}</div>
      <div class="tc-tags">
        <span class="tag tag-a">${s.short.split('·')[0].trim()}</span>
        <span class="tag tag-a">${s.short.split('·')[1].trim()}</span>
        <span class="tag tag-g">${s.exercises.length} exercices · ${s.exercises.reduce((a,e)=>a+e.sets.length,0)} séries</span>
      </div>
      <button class="btn btn-p" onclick="startSession(${info.sessionIdx})">🏋️ Commencer</button>
    </div>`;
  }

  const statsHtml=`<div class="stats-row">
    <div class="sc"><div class="sc-v">${totalSess}</div><div class="sc-l">Séances</div></div>
    <div class="sc"><div class="sc-v">${totalSets}</div><div class="sc-l">Séries</div></div>
    <div class="sc"><div class="sc-v">${streak}</div><div class="sc-l">Streak 🔥</div></div>
  </div>`;

  let lastHtml='';
  if(hist.length>0){
    const last=hist[hist.length-1];
    const dur=last.duration?fmtTime(last.duration):'—';
    const done=last.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.completed).length,0);
    const tot=last.exercises.reduce((a,e)=>a+e.sets.length,0);
    const p=PROG[last.sessionId];
    lastHtml=`<div class="ls-card">
      <div class="ls-row">
        <div><div class="ls-name">${p?p.name:last.sessionName}</div>
          <div class="ls-date">${relDate(new Date(last.date))} · ${dur}${last.avgRestTime?` · repos moy. ${fmtTime(last.avgRestTime)}`:''}</div></div>
        <div style="font-family:'DM Mono',monospace;font-size:13px;color:var(--accent)">${done}/${tot}</div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${tot>0?Math.round(done/tot*100):0}%"></div></div>
    </div>`; }

  const allSess=PROG.map((s,i)=>`<button class="sso ${!info.isRest&&i===info.sessionIdx?'rec':''}" onclick="startSession(${i})">
    <div><div class="sso-n">Séance ${i+1} — ${s.name}</div>
      <div class="sso-m">${s.exercises.length} exercices · ${s.exercises.reduce((a,e)=>a+e.sets.length,0)} séries</div></div>
    ${!info.isRest&&i===info.sessionIdx?'<span class="badge">AUJOURD\'HUI</span>':'<span class="chevron">›</span>'}
  </button>`).join('');

  return `<div class="pg gap stg">
    ${resumeHtml}${todayHtml}${statsHtml}${lastHtml}
    <div><div class="lbl">Programme</div><div class="gap" style="gap:7px">${allSess}</div></div>
  </div>`;
}

// ══════════════════════════════════════
// HISTORY
// ══════════════════════════════════════
function buildHistory() {
  const hist = loadHist();
  if(!hist.length) return `<div class="pg"><div class="empty">
    <div class="empty-ic">📋</div>
    <div class="empty-t">Aucune séance</div>
    <div class="empty-d">Tes séances apparaîtront ici.</div>
  </div></div>`;
  const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const MTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const rows=[...hist].reverse().map((s,i)=>{
    const p=PROG[s.sessionId]; const d=new Date(s.date);
    const done=s.exercises.reduce((a,e)=>a+e.sets.filter(x=>x.completed).length,0);
    const tot=s.exercises.reduce((a,e)=>a+e.sets.length,0);
    const vol=s.exercises.reduce((a,e)=>a+e.sets.filter(x=>x.completed).reduce((b,x)=>b+(x.weight*(x.reps||10)),0),0);
    const exRows=s.exercises.map(e=>{
      const setsHtml=e.sets.map(st=>`<span class="hd-set ${st.completed?'done':''}">${st.weight}kg×${st.reps||10}</span>`).join('');
      return `<div class="hd-ex"><div class="hd-exname">${e.name}${e.isReplaced?` <span style="font-size:10px;color:var(--orange)">(↔)</span>`:''}</div>
        <div class="hd-sets">${setsHtml}</div></div>`;
    }).join('');
    return `<div class="hc" onclick="this.classList.toggle('exp')">
      <div class="hc-acc"></div>
      <div style="padding-left:8px">
        <div class="hc-top">
          <div class="hc-name">${p?p.name:s.sessionName}</div>
          <div class="hc-date">${DAYS[d.getDay()]} ${d.getDate()} ${MTHS[d.getMonth()]}</div>
        </div>
        <div class="hc-stats">
          <span class="hc-st">⏱ <b>${s.duration?fmtTime(s.duration):'—'}</b></span>
          <span class="hc-st">✓ <b>${done}/${tot}</b></span>
          <span class="hc-st">📦 <b>${Math.round(vol)}kg</b> vol.</span>
          ${s.avgRestTime?`<span class="hc-st">⏸ <b>${fmtTime(s.avgRestTime)}</b> repos</span>`:''}
        </div>
        <div class="hc-det">${exRows}</div>
      </div>
    </div>`;
  }).join('');
  return `<div class="pg gap stg">${rows}</div>`;
}

function buildProgressPage(el) {
  el.innerHTML=`<div id="prog-wrap">
    <div class="ptabs">
      <button class="ptab ${progTab==='body'?'on':''}" onclick="setPTab('body')">💪 Poids de corps</button>
      <button class="ptab ${progTab==='exercise'?'on':''}" onclick="setPTab('exercise')">📈 Exercices</button>
    </div>
    <div class="pcon" id="pcon"></div>
  </div>`;
  buildProgContent();
}

function setPTab(t) {
  progTab=t;
  document.querySelectorAll('.ptab').forEach((b,i)=>b.classList.toggle('on',['body','exercise'][i]===t));
  buildProgContent();
}

function buildProgContent() {
  const el=document.getElementById('pcon');
  if(!el) return;
  if(progTab==='body') {
    el.innerHTML = buildBodyWeightContent();
    setTimeout(()=>drawBWChart(),50);
  } else {
    el.innerHTML = buildExerciseContent();
    setTimeout(()=>drawActiveChart(),50);
  }
}

/* ── BODY WEIGHT ── */
function buildBodyWeightContent() {
  const bw = loadBW();
  const today = new Date().toISOString().slice(0,10);
  const todayEntry = bw.find(x=>x.date===today);
  const latest = bw.length>0 ? bw[bw.length-1].weight : '';
  
  let stats='';
  if(bw.length>=2){
    const delta=bw[bw.length-1].weight - bw[0].weight;
    const deltaStr=(delta>=0?'+':'')+delta.toFixed(1)+'kg';
    stats=`<div style="display:flex;gap:10px;margin-top:10px">
      <div class="sc" style="flex:1"><div class="sc-v">${bw[bw.length-1].weight}</div><div class="sc-l">Actuel (kg)</div></div>
      <div class="sc" style="flex:1"><div class="sc-v">${bw[0].weight}</div><div class="sc-l">Départ (kg)</div></div>
      <div class="sc" style="flex:1"><div class="sc-v" style="color:${delta>=0?'var(--red)':'var(--accent)'}">${deltaStr}</div><div class="sc-l">Évolution</div></div>
    </div>`; }

  const scales=[['7j','7J'],['30j','30J'],['3m','3M'],['1an','1An'],['all','Tout']];
  const scalePills=scales.map(([v,l])=>`<button class="ts-pill ${bwScale===v?'on':''}" onclick="setBWScale('${v}')">${l}</button>`).join('');

  return `
    <div class="bw-input-card">
      <div class="lbl">Poids aujourd'hui</div>
      <div class="bw-row">
        <button class="wb" style="width:36px;height:36px" onclick="adjustBW(-0.5)">−</button>
        <input type="number" class="bw-inp" id="bw-inp" step="0.1" placeholder="75.0"
          value="${todayEntry?todayEntry.weight:''}" onchange="saveBW(this.value)">
        <span class="bw-unit">kg</span>
        <button class="wb" style="width:36px;height:36px" onclick="adjustBW(0.5)">+</button>
      </div>
      <button class="btn btn-p" style="margin-top:12px" onclick="saveBW(document.getElementById('bw-inp').value)">
        Enregistrer
      </button>
      ${stats}
    </div>
    <div>
      <div class="lbl">Courbe de poids</div>
      <div class="ts-row">${scalePills}</div>
    </div>
    <div class="cc">
      <div class="chart-box" style="height:150px"><canvas class="ch" id="bw-chart"></canvas></div>
    </div>
    <div style="height:20px"></div>`;
}

function setBWScale(s) {
  bwScale=s;
  document.querySelectorAll('.ts-pill').forEach(b=>{
    const v=b.getAttribute('onclick').match(/'([^']+)'/)?.[1];
    if(v) b.classList.toggle('on', v===s);
  });
  drawBWChart();
}

function saveBW(val) {
  const w=parseFloat(val);
  if(!w||w<20||w>300){ toast('⚠️','Poids invalide (20-300 kg)','err'); return; }
  const bw=loadBW();
  const today=new Date().toISOString().slice(0,10);
  const idx=bw.findIndex(x=>x.date===today);
  if(idx>=0) bw[idx].weight=w; else bw.push({date:today,weight:w});
  bw.sort((a,b)=>a.date.localeCompare(b.date));
  saveJSON(K.BW,bw);
  document.getElementById('bw-inp').value=w;
  drawBWChart();
  toast('✓',`Poids enregistré : ${w} kg`,'succ');
}

function adjustBW(d) {
  const inp=document.getElementById('bw-inp');
  const cur=parseFloat(inp.value)||70;
  inp.value=Math.round((cur+d)*10)/10;
}

function drawBWChart() {
  const canvas=document.getElementById('bw-chart');
  if(!canvas) return;
  const allBW=loadBW();
  const data=filterByScale(allBW.map(x=>({date:x.date,val:x.weight})),bwScale);
  if(data.length<2){ 
    const ctx=canvas.getContext('2d');
    const dpr=window.devicePixelRatio||1;
    canvas.width=(canvas.parentElement.offsetWidth||300)*dpr;
    canvas.height=150*dpr;
    ctx.scale(dpr,dpr);
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.font='12px DM Sans';
    ctx.textAlign='center';
    ctx.fillText('Pas assez de données',canvas.width/dpr/2,75);
    return; }
  drawLineChart(canvas, data, '#38bdf8', 150);
}

/* ── EXERCISE PROGRESS ── */
function buildExerciseContent() {
  const hist=loadHist();
  const allEx={};
  PROG.forEach(s=>s.exercises.forEach(e=>{if(!allEx[e.name]) allEx[e.name]=[];}));
  hist.forEach(s=>s.exercises.forEach(e=>{
    if(!allEx[e.name]) allEx[e.name]=[];
    const done=e.sets.filter(x=>x.completed);
    if(done.length>0){
      const avg=done.reduce((a,x)=>a+x.weight,0)/done.length;
      allEx[e.name].push({date:s.date,val:parseFloat(avg.toFixed(1))});
    }
  }));

  const scales=[['7j','7J'],['30j','30J'],['3m','3M'],['1an','1An'],['all','Tout']];
  const scalePills=scales.map(([v,l])=>`<button class="ts-pill ${progScale===v?'on':''}" onclick="setProgScale('${v}')">${l}</button>`).join('');

  // Exercise picker
  const exNames=Object.keys(allEx);
  if(!progExercise || !exNames.includes(progExercise)) progExercise=exNames[0]||null;

  const exListHtml=exNames.map(name=>{
    const d=allEx[name];
    const cur=d.length>0?d[d.length-1].val+'kg':'—';
    return `<button class="ex-sel-card ${name===progExercise?'sso rec':''}" onclick="selectProgEx('${name.replace(/'/g,"\\'")}')">
      <div><div style="font-weight:600;font-size:13px">${name}</div>
        <div style="font-size:11px;color:var(--text-muted)">${d.length} séances</div></div>
      <div style="font-family:'DM Mono',monospace;font-size:14px;color:var(--accent)">${cur}</div>
    </button>`;
  }).join('');

  let chartHtml='';
  if(progExercise&&allEx[progExercise]){
    const wgt=loadWgt();
    const curW=wgt[progExercise];
    const curWStr=curW?curW.map(s=>typeof s==='object'?s.w:s).filter((_,i)=>i>0)[0]+'kg':'—';
    const data=filterByScale(allEx[progExercise],progScale);
    const delta=data.length>=2?(data[data.length-1].val-data[0].val).toFixed(1):null;
    chartHtml=`<div class="cc">
      <div class="cc-hdr">
        <div class="cc-name">${progExercise}</div>
        <div class="cc-val">
          <div class="cc-kg">${curWStr}</div>
          ${delta!==null?`<div class="cc-delta ${delta<0?'neg':''}">${delta>=0?'+':''}${delta}kg</div>`:''}
        </div>
      </div>
      <div class="chart-box" style="height:140px"><canvas class="ch" id="ex-chart"></canvas></div>
    </div>`;
  }

  return `
    <div>${chartHtml}</div>
    <div>
      <div class="lbl">Échelle de temps</div>
      <div class="ts-row">${scalePills}</div>
    </div>
    <div>
      <div class="lbl">Exercices (${exNames.length})</div>
      <div class="gap" style="gap:7px">${exListHtml||'<div class="empty"><div class="empty-ic">📈</div><div class="empty-t">Aucune donnée</div></div>'}</div>
    </div>`;
}

function setProgScale(s) {
  progScale=s;
  buildProgContent();
}

function selectProgEx(name) {
  progExercise=name;
  buildProgContent();
}

function drawActiveChart() {
  if(progTab==='body'){ drawBWChart(); return; }
  const canvas=document.getElementById('ex-chart');
  if(!canvas||!progExercise) return;
  const hist=loadHist();
  const data=[];
  hist.forEach(s=>s.exercises.forEach(e=>{
    if(e.name===progExercise){
      const done=e.sets.filter(x=>x.completed);
      if(done.length>0){
        const avg=done.reduce((a,x)=>a+x.weight,0)/done.length;
        data.push({date:s.date,val:parseFloat(avg.toFixed(1))});
      }
    }
  }));
  const filtered=filterByScale(data,progScale);
  if(filtered.length<2){
    const ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1;
    canvas.width=(canvas.parentElement.offsetWidth||300)*dpr;
    canvas.height=140*dpr;ctx.scale(dpr,dpr);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='12px DM Sans';ctx.textAlign='center';
    ctx.fillText('Pas assez de données',canvas.width/dpr/2,70); return; }
  drawLineChart(canvas, filtered, '#aaff00', 140);
}

function filterByScale(data, scale) {
  if(scale==='all') return data;
  const now=new Date();
  const cutoffs={'7j':7,'30j':30,'3m':90,'1an':365};
  const days=cutoffs[scale]||9999;
  const cutoff=new Date(now - days*86400000);
  return data.filter(d=>new Date(d.date)>=cutoff);
}

function drawLineChart(canvas, data, color, h=110) {
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  const W=rect.width||canvas.parentElement.offsetWidth||300;
  canvas.width=W*dpr; canvas.height=h*dpr;
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const pad={t:8,r:8,b:26,l:40};
  const iW=W-pad.l-pad.r, iH=h-pad.t-pad.b;
  const vals=data.map(d=>d.val);
  const minV=Math.min(...vals),maxV=Math.max(...vals);
  const range=maxV-minV||1;
  const pts=data.map((d,i)=>({
    x:pad.l+(i/(data.length-1))*iW,
    y:pad.t+(1-(d.val-minV)/range)*iH,
    val:d.val,date:d.date
  }));
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  [0,.5,1].forEach(p=>{const y=pad.t+iH*p;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();});
  // Fill gradient
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+iH);
  grad.addColorStop(0,color.replace('#','rgba(').replace(/(.{2})(.{2})(.{2})/,(m,r,g,b)=>`${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},.22)`));
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const cp=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cp,pts[i-1].y,cp,pts[i].y,pts[i].x,pts[i].y);}
  ctx.lineTo(pts[pts.length-1].x,pad.t+iH);ctx.lineTo(pts[0].x,pad.t+iH);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  // Line
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const cp=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cp,pts[i-1].y,cp,pts[i].y,pts[i].x,pts[i].y);}
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
  // Dots
  pts.forEach((p,i)=>{ctx.beginPath();ctx.arc(p.x,p.y,i===pts.length-1?4:2.5,0,Math.PI*2);
    ctx.fillStyle=i===pts.length-1?color:color+'88';ctx.fill();});
  // Labels Y
  ctx.fillStyle='rgba(255,255,255,0.28)';ctx.font=`${9}px DM Mono, monospace`;ctx.textAlign='right';
  ctx.fillText(maxV,pad.l-4,pad.t+5);ctx.fillText(minV,pad.l-4,pad.t+iH);
  // Labels X
  ctx.textAlign='left';
  const MTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const showFirst=new Date(data[0].date);const showLast=new Date(data[data.length-1].date);
  ctx.fillText(`${showFirst.getDate()} ${MTHS[showFirst.getMonth()]}`,pad.l,h-2);
  ctx.textAlign='right';
  ctx.fillText(`${showLast.getDate()} ${MTHS[showLast.getMonth()]}`,W-pad.r,h-2);
}

function exportData() {

  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});

  a.href=u;a.download='iron-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);
}

function startSession(idx) {
  if(activeSess&&!loadAct()) activeSess=null;
  const wgt=loadWgt(); const p=PROG[idx];
  const exercises=p.exercises.map(ex=>{
    const saved=wgt[ex.name];
    const sets=saved ? saved.map(s=>({weight:typeof s==='object'?s.w:s, reps:typeof s==='object'?s.r:10, completed:false, restSeconds:0}))
      : ex.sets.map(s=>({weight:s.w, reps:s.r, completed:false, restSeconds:0}));
    return { name:ex.name, originalName:ex.name, isReplaced:false, sets };
  });
  activeSess = { sessionId:idx, sessionName:p.name, date:new Date().toISOString().slice(0,10),
    startTime:Date.now(), exercises, elapsedSeconds:0, restTimes:[] };
  saveJSON(K.ACT, activeSess);
  openSessOv();
}

function resumeSession() {
  activeSess=loadAct();
  if(!activeSess) return;
  openSessOv();
}

function openSessOv() {
  renderSessOv();
  document.getElementById('sess-ov').classList.add('open');
  startSessTimer();
}

function renderSessOv() {
  const s=activeSess; if(!s) return;
  const p=PROG[s.sessionId]||{name:s.sessionName};
  document.getElementById('sess-title').textContent=p.name;
  document.getElementById('sb').innerHTML = buildSessExercises(s) +
    `<button class="add-ex-btn" onclick="openAddExercise()">＋ Ajouter un exercice</button>`;
  updateSessProg();
  sessSeconds=s.elapsedSeconds||0;
  updateSessTimerDisplay();
}

function buildSessExercises(s) {
  return s.exercises.map((ex,ei)=>{
    const done=ex.sets.filter(x=>x.completed).length, tot=ex.sets.length;
    const allDone=done===tot;
    const setsHtml=ex.sets.map((st,si)=>`
      <div class="sr ${st.completed?'ok':''}" id="sr-${ei}-${si}">
        <div class="sn">S${si+1}</div>
        <div class="wg">
          <button class="wb" onclick="adjW(${ei},${si},-0.5)">−</button>
          <div class="wi-w">
            <input type="number" class="wi" value="${st.weight}" step="0.5" min="0"
              onchange="updW(${ei},${si},this.value)" inputmode="decimal">
            <span class="wu">kg</span>
          </div>
          <button class="wb" onclick="adjW(${ei},${si},0.5)">+</button>
        </div>
        <div class="rdiv"></div>
        <div class="rg">
          <button class="rb2" onclick="adjR(${ei},${si},-1)">−</button>
          <input type="number" class="ri" value="${st.reps||10}" min="1" max="100"
            onchange="updR(${ei},${si},this.value)" inputmode="numeric">
          <span class="rx">×</span>
          <button class="rb2" onclick="adjR(${ei},${si},1)">+</button>
        </div>
        <button class="ck" id="ck-${ei}-${si}" onclick="toggleSet(${ei},${si})">✓</button>
      </div>`).join('');
    return `<div class="ec ${allDone?'done':''}" id="ec-${ei}">
      <div class="ec-hdr" onclick="toggleEx(${ei})">
        <div class="ec-info">
          <div class="ec-name">${ex.name}${ex.isReplaced?` <span style="font-size:10px;color:var(--orange)">↔</span>`:''}</div>
          <div class="ec-meta">${tot} séries · ${ex.sets.map(s=>s.weight+'kg').join(' / ')}</div>
        </div>
        <div class="ec-right">
          <button class="ec-swap" onclick="event.stopPropagation();openSwap(${ei})">↔</button>
          <button class="ec-del" onclick="event.stopPropagation();delEx(${ei})">✕</button>
          <span class="sdg ${allDone?'full':''}">${done}/${tot}</span>
          <span class="arr ${ei===0?'up':''}" id="arr-${ei}">▾</span>
        </div>
      </div>
      <div class="ec-sets" id="ecs-${ei}" style="${ei===0?'':'display:none'}">${setsHtml}</div>
    </div>`;
  }).join('');
}

function toggleEx(ei) {
  const sets=document.getElementById('ecs-'+ei), arr=document.getElementById('arr-'+ei);
  const open=sets.style.display!=='none';
  sets.style.display=open?'none':'block';
  arr.classList.toggle('up',!open);
}

function toggleSet(ei, si) {
  if(!activeSess) return;
  const st=activeSess.exercises[ei].sets[si];
  st.completed=!st.completed;
  saveJSON(K.ACT, activeSess);
  const row=document.getElementById('sr-'+ei+'-'+si);
  const btn=document.getElementById('ck-'+ei+'-'+si);
  row.classList.toggle('ok',st.completed);
  btn.classList.add('pop');
  setTimeout(()=>btn.classList.remove('pop'),300);
  // Update badge
  const ex=activeSess.exercises[ei];
  const done=ex.sets.filter(x=>x.completed).length, tot=ex.sets.length;
  const sdg=document.querySelector('#ec-'+ei+' .sdg');
  if(sdg){sdg.textContent=done+'/'+tot;sdg.classList.toggle('full',done===tot);}
  document.getElementById('ec-'+ei)?.classList.toggle('done',done===tot);
  updateSessProg();
  // Rest timer: auto-start when set checked
  if(st.completed) startRest();
  else stopRest();
}

function updW(ei,si,val) { if(!activeSess) return; activeSess.exercises[ei].sets[si].weight=parseFloat(val)||0; saveJSON(K.ACT,activeSess); }
function adjW(ei,si,d) { if(!activeSess) return; const s=activeSess.exercises[ei].sets[si]; s.weight=Math.max(0,Math.round((s.weight+d)*10)/10); const inp=document.querySelector('#sr-'+ei+'-'+si+' .wi'); if(inp) inp.value=s.weight; updW(ei,si,s.weight); }
function updR(ei,si,val) { if(!activeSess) return; activeSess.exercises[ei].sets[si].reps=parseInt(val)||1; saveJSON(K.ACT,activeSess); }
function adjR(ei,si,d) { if(!activeSess) return; const s=activeSess.exercises[ei].sets[si]; s.reps=Math.max(1,Math.min(100,(s.reps||10)+d)); const inp=document.querySelector('#sr-'+ei+'-'+si+' .ri'); if(inp) inp.value=s.reps; updR(ei,si,s.reps); }

function updateSessProg() {
  if(!activeSess) return;
  let done=0,tot=0;
  activeSess.exercises.forEach(ex=>{done+=ex.sets.filter(s=>s.completed).length;tot+=ex.sets.length;});
  const pct=tot>0?Math.round(done/tot*100):0;
  document.getElementById('sess-prog-f').style.width=pct+'%';
  document.getElementById('sess-prog-t').textContent=`${done} / ${tot} séries · ${pct}%`;
  const btn=document.getElementById('sf-btn');
  if(btn) btn.style.opacity=done>0?'1':'0.5';
}

/* ── DELETE EXERCISE ── */
function delEx(ei) {
  openMod(`<div class="sh-ttl">Supprimer l'exercice ?</div>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:20px">"${activeSess.exercises[ei].name}"</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-s" onclick="closeMod()">Annuler</button>
      <button class="btn btn-d" onclick="doDelEx(${ei})">Supprimer</button>
    </div>`);
}

function doDelEx(ei) {
  if(!activeSess) return;
  activeSess.exercises.splice(ei,1);
  saveJSON(K.ACT,activeSess);
  closeMod();
  // Re-render exercises
  const sb=document.getElementById('sb');
  sb.innerHTML=buildSessExercises(activeSess)+`<button class="add-ex-btn" onclick="openAddExercise()">＋ Ajouter un exercice</button>`;
  updateSessProg();
  toast('✓','Exercice supprimé','succ');
}

/* ── ADD EXERCISE ── */
function openAddExercise() {
  const allEx=[];
  PROG.forEach(p=>p.exercises.forEach(e=>{if(!allEx.includes(e.name)) allEx.push(e.name);}));
  const sugHtml=allEx.map(n=>`<button class="sw-btn" onclick="addEx('${n.replace(/'/g,"\\'")}')"><span>💪</span>${n}</button>`).join('');
  openMod(`<div class="sh-ttl">Ajouter un exercice</div>
    <div class="sw-inp-w">
      <span style="color:var(--text-muted)">✏️</span>
      <input type="text" class="sw-inp" id="add-ex-inp" placeholder="Nom personnalisé...">
    </div>
    <button class="btn btn-p" style="margin-bottom:14px" onclick="addEx(document.getElementById('add-ex-inp').value)">Ajouter</button>
    <div class="lbl">Exercices du programme</div>
    <div class="sw-sugg">${sugHtml}</div>`);
}

function addEx(name) {
  name=(name||'').trim(); if(!name){ toast('⚠️','Entre un nom','err'); return; }
  if(!activeSess) return;
  // Try to find in program for default sets
  let defSets=[{w:20,r:10},{w:20,r:10},{w:20,r:10}];
  PROG.forEach(p=>p.exercises.forEach(e=>{ if(e.name===name) defSets=e.sets.map(s=>({weight:s.w,reps:s.r,completed:false,restSeconds:0})); }));
  // Check saved weights
  const saved=loadWgt()[name];
  if(saved) defSets=saved.map(s=>({weight:typeof s==='object'?s.w:s,reps:typeof s==='object'?s.r:10,completed:false,restSeconds:0}));
  activeSess.exercises.push({name,originalName:name,isReplaced:false,sets:defSets});
  saveJSON(K.ACT,activeSess);
  closeMod();
  const sb=document.getElementById('sb');
  sb.innerHTML=buildSessExercises(activeSess)+`<button class="add-ex-btn" onclick="openAddExercise()">＋ Ajouter un exercice</button>`;
  updateSessProg();
  toast('✓',`${name} ajouté`,'succ');
}

/* ── SWAP ── */
function openSwap(ei) {
  if(!activeSess) return;
  swapTarget=ei;
  const ex=activeSess.exercises[ei];
  const alts=ALTS[ex.originalName]||[];
  const altHtml=alts.map(a=>`<button class="sw-btn" onclick="confirmSwap('${a.replace(/'/g,"\\'")}')"><span>💪</span>${a}</button>`).join('');
  openMod(`<div class="sh-ttl">Remplacer l'exercice</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Actuellement : <b style="color:var(--text)">${ex.name}</b></div>
    <div class="sw-inp-w"><span style="color:var(--text-muted)">✏️</span>
      <input type="text" class="sw-inp" id="sw-inp" placeholder="Nom personnalisé..."></div>
    <button class="btn btn-p" style="margin-bottom:14px" onclick="confirmSwap(document.getElementById('sw-inp').value)">Confirmer</button>
    ${alts.length?`<div class="lbl">Suggestions</div><div class="sw-sugg">${altHtml}</div>`:''}
  `);
}

function confirmSwap(name) {
  name=(name||'').trim(); if(!name){ toast('⚠️','Entre un nom','err'); return; }
  if(swapTarget===null||!activeSess) return;
  const ex=activeSess.exercises[swapTarget];
  ex.name=name; ex.isReplaced=true;
  saveJSON(K.ACT,activeSess); closeMod();
  const nameEl=document.querySelector('#ec-'+swapTarget+' .ec-name');
  if(nameEl) nameEl.innerHTML=name+' <span style="font-size:10px;color:var(--orange)">↔</span>';
  swapTarget=null;
  toast('↔','Exercice remplacé','succ');
}

/* ── CLOSE SESSION (minimize) ── */
function closeSession() {
  if(activeSess){ activeSess.elapsedSeconds=sessSeconds; saveJSON(K.ACT,activeSess); }
  stopSessTimer(); stopRest();
  document.getElementById('sess-ov').classList.remove('open');
  if(curPage==='home') document.getElementById('pc').innerHTML=buildHome();
}

/* ── FINISH SESSION ── */
function finishSession() {
  if(!activeSess) return;
  const done=activeSess.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.completed).length,0);
  if(!done){ toast('⚠️','Complète au moins une série','err'); return; }
  stopSessTimer(); stopRest();
  activeSess.duration=sessSeconds;
  const avg=activeSess.restTimes.length>0?Math.round(activeSess.restTimes.reduce((a,x)=>a+x,0)/activeSess.restTimes.length):0;
  activeSess.avgRestTime=avg;
  // Progression
  const cfg=loadCfg(); const wgt=loadWgt(); const inc=cfg.increment||2.5;
  let progCount=0;
  activeSess.exercises.forEach(ex=>{
    const allDone=ex.sets.every(s=>s.completed);
    if(allDone){
      wgt[ex.name]=ex.sets.map(s=>({w:Math.round((s.weight+inc)*10)/10,r:s.reps}));
      progCount++;
    } else {
      wgt[ex.name]=ex.sets.map(s=>({w:s.weight,r:s.reps}));
    }
  });
  saveJSON(K.WGT,wgt);
  const hist=loadHist();
  hist.push({ sessionId:activeSess.sessionId, sessionName:activeSess.sessionName,
    date:activeSess.date, duration:activeSess.duration, avgRestTime:avg,
    exercises:activeSess.exercises.map(ex=>({name:ex.name,originalName:ex.originalName,isReplaced:ex.isReplaced,
      sets:ex.sets.map(s=>({weight:s.weight,reps:s.reps,completed:s.completed}))})) });
  saveJSON(K.HIST,hist); saveJSON(K.ACT,null);
  const dur=sessSeconds; activeSess=null;
  // Remove dot
  document.querySelector('#ni-home .ndot')?.remove();
  // Completion screen
  document.getElementById('sb').innerHTML=`<div class="comp">
    <div class="comp-em cel">🏆</div>
    <div class="comp-t">Séance finie !</div>
    <div class="comp-s">${done} séries · ${fmtTime(dur)}${avg?` · repos moy. ${fmtTime(avg)}`:''}</div>
    ${progCount>0?`<div class="prog-note"><b>+${inc}kg sur ${progCount} exercice${progCount>1?'s':''} !</b><small>Progression appliquée automatiquement</small></div>`:''}
  </div>`;
  document.getElementById('sf-btn').textContent='✕ Fermer';
  document.getElementById('sf-btn').onclick=()=>{ document.getElementById('sess-ov').classList.remove('open'); if(curPage==='home') document.getElementById('pc').innerHTML=buildHome(); };
  launchConfetti();
}

// ══════════════════════════════════════
// TIMERS
// ══════════════════════════════════════
function startSessTimer() {
  stopSessTimer();
  sessTimerInt=setInterval(()=>{sessSeconds++;updateSessTimerDisplay();},1000);
}
function stopSessTimer() { if(sessTimerInt){clearInterval(sessTimerInt);sessTimerInt=null;} }
function updateSessTimerDisplay() { const e=document.getElementById('sess-timer'); if(e) e.textContent=fmtTime(sessSeconds); }

/* ── REST TIMER ── */
function startRest() {
  stopRest();
  restState={active:true,elapsed:0,countdown:null,interval:null,lastSaved:0};
  restState.interval=setInterval(()=>{
    restState.elapsed++;
    updateRestDisplay();
    if(restState.countdown!==null&&restState.elapsed>=restState.countdown){
      // Vibrate if possible
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
      stopRest();
      toast('⏰','Fin du repos !','succ');
    }
  },1000);
  document.getElementById('rest-strip').classList.add('vis');
  updateRestDisplay();
}

function stopRest() {
  if(restState.interval){clearInterval(restState.interval);restState.interval=null;}
  if(restState.active&&restState.elapsed>3&&activeSess){
    activeSess.restTimes=activeSess.restTimes||[];
    activeSess.restTimes.push(restState.elapsed);
    saveJSON(K.ACT,activeSess);
  }
  restState.active=false;
  document.getElementById('rest-strip').classList.remove('vis');
}

function setRestCountdown(s) {
  restState.countdown=s;
  // Restart from 0
  if(restState.interval){clearInterval(restState.interval);}
  restState.elapsed=0;
  restState.interval=setInterval(()=>{
    restState.elapsed++;
    updateRestDisplay();
    if(restState.elapsed>=restState.countdown){
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
      stopRest();
      toast('⏰','Fin du repos !','succ');
    }
  },1000);
  updateRestDisplay();
}

function updateRestDisplay() {
  const el=document.getElementById('rst-t'); if(!el) return;
  if(restState.countdown!==null){
    const rem=Math.max(0,restState.countdown-restState.elapsed);
    el.textContent=fmtTime(rem);
    el.style.color=rem<10?'var(--red)':'var(--orange)';
  } else {
    el.textContent=fmtTime(restState.elapsed);
    el.style.color='var(--orange)';
  }
}

// ══════════════════════════════════════
// MODAL
// ══════════════════════════════════════
function openMod(html) { document.getElementById('mc').innerHTML=html; document.getElementById('mbg').classList.add('open'); document.getElementById('msh').classList.add('open'); }
function closeMod() { document.getElementById('mbg').classList.remove('open'); document.getElementById('msh').classList.remove('open'); }

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
let toastTO=null;
function toast(ic,msg,type='succ') {
  document.getElementById('t-ic').textContent=ic;
  document.getElementById('t-msg').textContent=msg;
  const el=document.getElementById('toast');
  el.className='sh '+type;
  if(toastTO) clearTimeout(toastTO);
  toastTO=setTimeout(()=>el.className='',2400);
}

// ══════════════════════════════════════
// CONFETTI
// ══════════════════════════════════════
function launchConfetti() {
  const c=document.getElementById('cvc'); c.style.display='block';
  c.width=innerWidth; c.height=innerHeight;
  const ctx=c.getContext('2d');
  const p=Array.from({length:90},()=>({x:Math.random()*c.width,y:Math.random()*c.height-c.height,
    r:Math.random()*5+2,d:Math.random()*80+20,tilt:0,ta:Math.random()*.1,tai:(Math.random()*.07+.05),
    col:['#aaff00','#fff','#ffcc00','#ff4455','#38bdf8'][Math.floor(Math.random()*5)]}));
  let tick=0,angle=0;
  function draw(){ctx.clearRect(0,0,c.width,c.height);angle+=.01;tick++;
    p.forEach(x=>{x.ta+=x.tai;x.y+=Math.cos(angle+x.d)+2+x.r/2;x.x+=Math.sin(angle);x.tilt=Math.sin(x.ta)*15;
      ctx.beginPath();ctx.lineWidth=x.r/2;ctx.strokeStyle=x.col;
      ctx.moveTo(x.x+x.tilt+x.r/4,x.y);ctx.lineTo(x.x+x.tilt,x.y+x.tilt+x.r/4);ctx.stroke();});
    if(tick<220) requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,c.width,c.height);c.style.display='none';}}
  requestAnimationFrame(draw);
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h>0?`${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}

function relDate(d){const t=new Date();t.setHours(0,0,0,0);const dd=new Date(d);dd.setHours(0,0,0,0);
  const diff=Math.round((t-dd)/86400000);
  if(diff===0) return "Aujourd'hui";if(diff===1) return "Hier";if(diff<7) return `Il y a ${diff}j`;
  const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'],MTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  return `${DAYS[d.getDay()]} ${d.getDate()} ${MTHS[d.getMonth()]}`;}

function showSessionPicker() {
  openMod(`<div class="sh-ttl">Choisir une séance</div><div class="sw-sugg">
    ${PROG.map((s,i)=>`<button class="sw-btn" onclick="closeMod();startSession(${i})">
      <span>🏋️</span><div><div style="font-weight:600">${s.name}</div>
      <div style="font-size:11px;color:var(--text-muted)">${s.exercises.length} exercices</div></div>
    </button>`).join('')}</div>`);
}

// ══════════════════════════════════════
// PWA
// ══════════════════════════════════════
function injectManifest(){
  const ic=genIcon();
  const m={name:'IRON — Workout Tracker',short_name:'IRON',description:'Suivi musculation',
    start_url:'.',display:'standalone',background_color:'#0a0a0a',theme_color:'#0a0a0a',
    orientation:'portrait',icons:[{src:ic,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:ic,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
  const b=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
  document.getElementById('pwa-manifest').href=URL.createObjectURL(b);
}
function genIcon(){const c=document.createElement('canvas');c.width=c.height=192;const ctx=c.getContext('2d');
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,192,192);
  const g=ctx.createRadialGradient(96,96,0,96,96,96);g.addColorStop(0,'rgba(170,255,0,.18)');g.addColorStop(1,'rgba(170,255,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,192,192);
  ctx.fillStyle='#aaff00';ctx.font='bold 80px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⚡',96,96);
  return c.toDataURL('image/png');}

function registerSW(){
  if(!('serviceWorker' in navigator)) return;
  const sw=`const C='iron-v2';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  const b=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
function init(){
  injectManifest(); registerSW();
  const act=loadAct();
  if(act){ activeSess=act;
    const dot=document.createElement('span');dot.className='ndot';
    document.getElementById('ni-home').appendChild(dot); }
  document.getElementById('pc').innerHTML=buildHome();
}
init();
</script>
